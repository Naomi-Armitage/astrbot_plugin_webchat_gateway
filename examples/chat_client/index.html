<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebChat Gateway · Chat Demo</title>
    <style>
      :root {
        --bg: #0d1117;
        --bg-elev: #0b0f15;
        --surface: #161b22;
        --surface-2: #1c2330;
        --border: #30363d;
        --border-soft: #21262d;
        --text: #e6edf3;
        --text-strong: #f0f6fc;
        --muted: #8b949e;
        --accent: #a371f7;
        --accent-strong: #b692ff;
        --accent-soft: rgba(163, 113, 247, 0.14);
        --good: #3fb950;
        --warn: #d29922;
        --bad: #f85149;
        --user-bubble: #2f1c5e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14.5px/1.55 "Comic Sans MS", "Comic Neue", "Chalkboard SE", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent-strong); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .wrap {
        max-width: 820px;
        margin: 0 auto;
        padding: 16px 20px 20px;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border-soft);
      }
      .brand {
        display: flex; align-items: center; gap: 10px;
        text-decoration: none;
      }
      .brand-mark {
        width: 26px; height: 26px;
        display: grid; place-items: center;
        background: var(--accent-soft);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .brand-mark svg { width: 14px; height: 14px; color: var(--accent-strong); }
      header h1 {
        font-size: 14px;
        margin: 0;
        flex: 1;
        font-weight: 600;
        color: var(--text-strong);
      }
      .badge {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--muted);
        font-weight: 500;
      }
      .badge.good { background: rgba(63, 185, 80, .12); color: var(--good); border-color: rgba(63, 185, 80, .35); }
      .badge.warn { background: rgba(210, 153, 34, .12); color: var(--warn); border-color: rgba(210, 153, 34, .35); }
      .badge.bad  { background: rgba(248, 81, 73, .12); color: var(--bad); border-color: rgba(248, 81, 73, .35); }

      .actions { display: flex; gap: 6px; }
      .actions a, .actions button {
        font: inherit;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 5px 11px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        text-decoration: none !important;
      }
      .actions a:hover, .actions button:hover {
        color: var(--text-strong);
        border-color: var(--accent);
      }

      .settings {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        padding: 14px 0;
        border-bottom: 1px solid var(--border-soft);
      }
      .settings label {
        display: flex;
        flex-direction: column;
        font-size: 11px;
        color: var(--muted);
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      .settings input {
        margin-top: 5px;
        padding: 9px 11px;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 7px;
        font: inherit;
        transition: border-color .12s ease, box-shadow .12s ease;
      }
      .settings input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      #messages::-webkit-scrollbar { width: 8px; }
      #messages::-webkit-scrollbar-thumb {
        background: var(--border); border-radius: 4px;
      }
      .msg {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 14px;
        line-height: 1.55;
      }
      .msg.user {
        align-self: flex-end;
        background: var(--user-bubble);
        color: #f3eaff;
        border: 1px solid color-mix(in oklab, var(--accent) 35%, transparent);
      }
      .msg.bot  {
        align-self: flex-start;
        background: var(--surface);
        border: 1px solid var(--border-soft);
      }
      .msg.error {
        align-self: stretch;
        background: rgba(248, 81, 73, .08);
        border: 1px solid rgba(248, 81, 73, .4);
        color: var(--text);
      }
      .msg.notice {
        align-self: stretch;
        background: rgba(210, 153, 34, .08);
        border: 1px solid rgba(210, 153, 34, .4);
        color: var(--text);
      }

      footer {
        display: flex;
        gap: 10px;
        padding-top: 12px;
        border-top: 1px solid var(--border-soft);
      }
      footer textarea {
        flex: 1;
        min-height: 64px;
        max-height: 200px;
        padding: 10px 12px;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        resize: vertical;
        font: inherit;
        transition: border-color .12s ease, box-shadow .12s ease;
      }
      footer textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      footer button {
        padding: 0 22px;
        background: var(--accent);
        color: #fff;
        border: 1px solid var(--accent);
        border-radius: 8px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: background .12s ease;
      }
      footer button:hover:not(:disabled) { background: var(--accent-strong); }
      footer button:disabled { opacity: .5; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a class="brand" href="/" aria-label="Back to landing">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
          </span>
        </a>
        <h1>WebChat Gateway · Chat</h1>
        <span id="quotaBadge" class="badge">--</span>
        <div class="actions">
          <a href="/" title="返回首页">← 首页</a>
          <button id="newSession" type="button">新会话</button>
          <button id="clearHistory" type="button">清空</button>
        </div>
      </header>

      <div class="settings">
        <label>
          API Base
          <input id="apiBase" placeholder="留空即同源" />
        </label>
        <label>
          Endpoint Prefix
          <input id="endpointPrefix" placeholder="/api/webchat" />
        </label>
        <label>
          Token (一次性，务必保存)
          <input id="token" type="password" placeholder="paste your token" />
        </label>
        <label>
          Username
          <input id="username" placeholder="昵称" />
        </label>
      </div>

      <div id="messages"></div>

      <footer>
        <textarea id="input" placeholder="输入消息后按 Ctrl/Cmd+Enter 发送"></textarea>
        <button id="send">发送</button>
      </footer>
    </div>

    <script>
      const LS = {
        apiBase: "wcg.apiBase",
        prefix: "wcg.prefix",
        token: "wcg.token",
        username: "wcg.username",
        sessionId: "wcg.sessionId",
      };
      const SS = {
        history: "wcg.history",
      };

      const $ = (id) => document.getElementById(id);
      const apiBase = $("apiBase");
      const prefix = $("endpointPrefix");
      const token = $("token");
      const usernameEl = $("username");
      const inputEl = $("input");
      const sendBtn = $("send");
      const msgs = $("messages");
      const badge = $("quotaBadge");

      // hydrate from localStorage
      apiBase.value = localStorage.getItem(LS.apiBase) || "";
      prefix.value = localStorage.getItem(LS.prefix) || "/api/webchat";
      token.value = localStorage.getItem(LS.token) || "";
      usernameEl.value = localStorage.getItem(LS.username) || "Friend";
      let sessionId = localStorage.getItem(LS.sessionId);
      if (!sessionId) {
        sessionId = (crypto.randomUUID && crypto.randomUUID()) || String(Date.now());
        localStorage.setItem(LS.sessionId, sessionId);
      }

      const persistField = (el, key) => el.addEventListener("change", () => {
        localStorage.setItem(key, el.value.trim());
      });
      persistField(apiBase, LS.apiBase);
      persistField(prefix, LS.prefix);
      persistField(token, LS.token);
      persistField(usernameEl, LS.username);

      // hydrate history
      const history = JSON.parse(sessionStorage.getItem(SS.history) || "[]");
      for (const item of history) {
        addMessage(item.role, item.text, { skipPersist: true });
      }
      scrollToEnd();

      function setBadge(remaining, quota) {
        if (remaining == null || quota == null) {
          badge.textContent = "--";
          badge.className = "badge";
          return;
        }
        badge.textContent = `今日剩余 ${remaining} / ${quota}`;
        const ratio = remaining / Math.max(1, quota);
        badge.className = "badge " + (ratio >= 0.3 ? "good" : ratio >= 0.1 ? "warn" : "bad");
      }

      function addMessage(role, text, opts = {}) {
        const div = document.createElement("div");
        div.className = "msg " + role;
        div.textContent = text;
        msgs.appendChild(div);
        if (!opts.skipPersist && (role === "user" || role === "bot")) {
          history.push({ role, text, ts: Date.now() });
          sessionStorage.setItem(SS.history, JSON.stringify(history));
        }
        scrollToEnd();
      }

      function scrollToEnd() {
        msgs.scrollTop = msgs.scrollHeight;
      }

      $("clearHistory").onclick = () => {
        history.length = 0;
        sessionStorage.removeItem(SS.history);
        msgs.innerHTML = "";
      };
      $("newSession").onclick = () => {
        sessionId = (crypto.randomUUID && crypto.randomUUID()) || String(Date.now());
        localStorage.setItem(LS.sessionId, sessionId);
        history.length = 0;
        sessionStorage.removeItem(SS.history);
        msgs.innerHTML = "";
        addMessage("notice", `已开启新会话: ${sessionId}`);
      };

      inputEl.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          send();
        }
      });
      sendBtn.onclick = send;

      async function send() {
        const message = inputEl.value.trim();
        if (!message) return;
        if (!token.value.trim()) {
          addMessage("error", "请先填写 Token");
          return;
        }
        const url = `${apiBase.value.trim()}${prefix.value.trim() || "/api/webchat"}/chat`;
        sendBtn.disabled = true;
        addMessage("user", message);
        inputEl.value = "";

        try {
          const resp = await fetch(url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token.value.trim()}`,
            },
            body: JSON.stringify({
              session_id: sessionId,
              username: usernameEl.value.trim() || "Friend",
              message,
            }),
          });
          let payload;
          try { payload = await resp.json(); } catch { payload = {}; }

          if (resp.ok) {
            setBadge(payload.remaining, payload.daily_quota);
            addMessage("bot", payload.reply || "(空回复)");
            return;
          }

          const err = payload.error || `http_${resp.status}`;
          if (resp.status === 401) {
            addMessage("error", "Token 无效或已撤销，请联系管理员。");
          } else if (resp.status === 429 && err === "quota_exceeded") {
            setBadge(0, payload.daily_quota);
            addMessage("notice", "今日额度已用完，明日 0 点重置。");
          } else if (resp.status === 429 && err === "concurrent_request") {
            addMessage("notice", "上一条还在处理中，稍候。");
          } else if (resp.status === 429 && err === "ip_blocked") {
            const retry = resp.headers.get("Retry-After") || payload.retry_after || "?";
            addMessage("error", `请求过于频繁，已暂时封禁，${retry} 秒后重试。`);
          } else if (resp.status === 400 && err === "message_too_long") {
            addMessage("error", `消息过长 (上限 ${payload.max_length})。`);
          } else if (resp.status === 403 && err === "forbidden_origin") {
            addMessage("error", "页面来源未在 allowed_origins 中。");
          } else {
            addMessage("error", `请求失败: ${err} ${payload.detail || ""}`);
          }
        } catch (error) {
          addMessage("error", `网络错误: ${String(error)}`);
        } finally {
          sendBtn.disabled = false;
        }
      }
    </script>
  </body>
</html>

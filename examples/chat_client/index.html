 .empty-icon{width:56px;height:56px;display:grid;place-items:center;background:var(--accent-soft);border:1px solid var(--rule);border-radius:16px;color:var(--accent);box-shadow:0 1px 2px var(--shadow)}.empty-state .empty-icon svg{width:26px;height:26px}.empty-state .empty-title{font:16px/1.4 var(--font-display);color:var(--ink);margin:0}.empty-state .empty-hint{font-size:13px;color:var(--ink-soft);margin:0}@keyframes emptyIn{0%{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}#messages:has(.msg) .empty-state{display:none}footer{display:flex;gap:10px;padding-top:8px}footer textarea{flex:1;min-height:36px;max-height:200px;padding:6px 12px;background:var(--card);color:var(--ink);border:1px solid var(--rule);border-radius:10px;resize:vertical;font:inherit;line-height:1.5;transition:border-color .15s ease,box-shadow .15s ease}footer textarea::placeholder{color:var(--ink-soft)}footer textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--ring)}footer button{padding:0 14px;background:var(--accent);color:#fff;border:1px solid var(--accent);border-radius:10px;font:inherit;font-weight:600;font-size:14px;cursor:pointer;box-shadow:0 1px 2px var(--shadow);display:inline-flex;align-items:center;gap:7px;transition:background .15s ease,transform .12s ease,box-shadow .15s ease}footer button svg{width:14px;height:14px}footer button:hover:not(:disabled){background:var(--accent-strong);border-color:var(--accent-strong);box-shadow:0 2px 4px var(--shadow-strong)}footer button:active:not(:disabled){transform:translateY(1px)}footer button:disabled{opacity:.5;cursor:not-allowed}@media (max-width: 719px){.main{padding:0 14px calc(12px + env(safe-area-inset-bottom))}header{gap:8px;padding:12px 14px 10px}.who{display:none}.actions{gap:4px}.actions a,.actions button{padding:4px 9px;font-size:12px}#messages{padding:56px 0 14px;gap:8px}.msg{max-width:86%;padding:9px 12px;font-size:14px}footer{gap:8px;padding-top:6px}footer textarea{min-height:36px;max-height:120px;font-size:16px;resize:none}footer button{padding:0 12px;font-size:14px}.sidebar-toggle{display:inline-flex}.sidebar{position:fixed;left:0;top:0;bottom:0;width:280px;max-width:80vw;flex:0 0 auto;background:var(--paper);border-right:1px solid var(--rule);transform:translate(-100%);z-index:100;transition:transform .25s ease;box-shadow:0 0 24px var(--shadow-strong)}.sidebar.open{transform:translate(0)}.sidebar-backdrop:not([hidden]){display:block}}[data-theme^=classic] header h1{font-size:14px;font-weight:600}[data-theme^=classic] .msg{font-size:14px}[data-theme^=classic] .msg.user{background:var(--highlight);color:var(--on-highlight);border-color:color-mix(in oklab,var(--accent) 30%,transparent)}[data-theme^=classic-dark] .msg.user{border-color:color-mix(in oklab,var(--accent) 45%,transparent)}@media (prefers-reduced-motion: reduce){*,*:before,*:after{transition-duration:.001ms!important;animation-duration:.001ms!important}}</style>
  </head>
  <body>
    <div class="wrap">
      <aside id="sidebar" class="sidebar" aria-label="历史对话">
        <div class="sidebar-head">
          <button id="newSessionBtn" class="sidebar-new" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            <span>新会话</span>
          </button>
        </div>
        <ul id="sessionList" class="session-list" role="list"></ul>
      </aside>
      <div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>

      <div class="main">
        <header>
          <button id="sidebarToggle" type="button" class="sidebar-toggle"
            aria-label="切换会话列表" aria-controls="sidebar" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 6h18M3 12h18M3 18h18"/>
            </svg>
          </button>
          <a class="brand" href="/" aria-label="返回首页">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
              </svg>
            </span>
          </a>
          <h1 id="brandName">WebChat Gateway</h1>
          <span id="who" class="who" hidden></span>
          <span id="syncStatus" class="badge sync-status" data-state="live" title="同步状态">实时</span>
          <span id="quotaBadge" class="badge">--</span>
          <div class="actions">
            <button id="themeToggle" type="button" class="icon-only"
              aria-label="切换深浅色" aria-pressed="false">
              <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            </button>
            <button id="clearHistory" type="button">清空</button>
            <button id="logout" type="button" class="danger" title="退出并清除本机保存的 token">登出</button>
          </div>
        </header>

        <div id="messages">
          <div id="emptyState" class="empty-state">
            <span class="empty-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
              </svg>
            </span>
            <p class="empty-title">开始一段对话</p>
            <p class="empty-hint">把想法写在下面，按 Enter 发送</p>
          </div>
        </div>

        <footer>
          <textarea id="input" rows="1" placeholder="Enter 发送，Shift+Enter 换行"></textarea>
          <button id="send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m22 2-7 20-4-9-9-4 20-7Z"/>
            </svg>
            <span>发送</span>
          </button>
        </footer>
      </div>
    </div>

  </body>
</html>

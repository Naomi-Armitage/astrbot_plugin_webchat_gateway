<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebChat Gateway · Chat</title>
    <style>
      :root {
        --bg: #0d1117;
        --bg-elev: #0b0f15;
        --surface: #161b22;
        --surface-2: #1c2330;
        --border: #30363d;
        --border-soft: #21262d;
        --text: #e6edf3;
        --text-strong: #f0f6fc;
        --muted: #8b949e;
        --accent: #a371f7;
        --accent-strong: #b692ff;
        --accent-soft: rgba(163, 113, 247, 0.14);
        --good: #3fb950;
        --warn: #d29922;
        --bad: #f85149;
        --user-bubble: #2f1c5e;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14.5px/1.55 "Comic Sans MS", "Comic Neue", "Chalkboard SE", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent-strong); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .wrap {
        max-width: 820px;
        margin: 0 auto;
        padding: 16px 20px 20px;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border-soft);
      }
      .brand {
        display: flex; align-items: center; gap: 10px;
        text-decoration: none;
      }
      .brand-mark {
        width: 26px; height: 26px;
        display: grid; place-items: center;
        background: var(--accent-soft);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .brand-mark svg { width: 14px; height: 14px; color: var(--accent-strong); }
      header h1 {
        font-size: 14px;
        margin: 0;
        flex: 1;
        font-weight: 600;
        color: var(--text-strong);
      }
      .badge {
        font-size: 11px;
        padding: 4px 10px;
        border-radius: 999px;
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--muted);
        font-weight: 500;
      }
      .badge.good { background: rgba(63, 185, 80, .12); color: var(--good); border-color: rgba(63, 185, 80, .35); }
      .badge.warn { background: rgba(210, 153, 34, .12); color: var(--warn); border-color: rgba(210, 153, 34, .35); }
      .badge.bad  { background: rgba(248, 81, 73, .12); color: var(--bad); border-color: rgba(248, 81, 73, .35); }

      .actions { display: flex; gap: 6px; }
      .actions a, .actions button {
        font: inherit;
        background: transparent;
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 5px 11px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        text-decoration: none !important;
      }
      .actions a:hover, .actions button:hover {
        color: var(--text-strong);
        border-color: var(--accent);
      }
      .actions .danger:hover {
        color: var(--bad);
        border-color: var(--bad);
      }

      .who {
        font-size: 12px;
        color: var(--muted);
        padding: 4px 10px;
        border: 1px solid var(--border-soft);
        border-radius: 999px;
        background: var(--surface);
      }
      .who strong { color: var(--text-strong); font-weight: 600; }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      #messages::-webkit-scrollbar { width: 8px; }
      #messages::-webkit-scrollbar-thumb {
        background: var(--border); border-radius: 4px;
      }
      .msg {
        max-width: 80%;
        padding: 10px 14px;
        border-radius: 12px;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 14px;
        line-height: 1.55;
      }
      .msg.user {
        align-self: flex-end;
        background: var(--user-bubble);
        color: #f3eaff;
        border: 1px solid color-mix(in oklab, var(--accent) 35%, transparent);
      }
      .msg.bot  {
        align-self: flex-start;
        background: var(--surface);
        border: 1px solid var(--border-soft);
      }
      .msg.error {
        align-self: stretch;
        background: rgba(248, 81, 73, .08);
        border: 1px solid rgba(248, 81, 73, .4);
        color: var(--text);
      }
      .msg.notice {
        align-self: stretch;
        background: rgba(210, 153, 34, .08);
        border: 1px solid rgba(210, 153, 34, .4);
        color: var(--text);
      }

      footer {
        display: flex;
        gap: 10px;
        padding-top: 12px;
        border-top: 1px solid var(--border-soft);
      }
      footer textarea {
        flex: 1;
        min-height: 64px;
        max-height: 200px;
        padding: 10px 12px;
        background: var(--surface);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 8px;
        resize: vertical;
        font: inherit;
        transition: border-color .12s ease, box-shadow .12s ease;
      }
      footer textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      footer button {
        padding: 0 22px;
        background: var(--accent);
        color: #fff;
        border: 1px solid var(--accent);
        border-radius: 8px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: background .12s ease;
      }
      footer button:hover:not(:disabled) { background: var(--accent-strong); }
      footer button:disabled { opacity: .5; cursor: not-allowed; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a class="brand" href="/" aria-label="返回首页">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
          </span>
        </a>
        <h1 id="brandName">WebChat Gateway</h1>
        <span id="who" class="who" hidden></span>
        <span id="quotaBadge" class="badge">--</span>
        <div class="actions">
          <button id="newSession" type="button">新会话</button>
          <button id="clearHistory" type="button">清空</button>
          <button id="logout" type="button" class="danger" title="退出并清除本机保存的 token">登出</button>
        </div>
      </header>

      <div id="messages"></div>

      <footer>
        <textarea id="input" placeholder="输入消息后按 Ctrl/Cmd+Enter 发送"></textarea>
        <button id="send">发送</button>
      </footer>
    </div>

    <script>
      (() => {
      const API_BASE = "";
      const PREFIX = "/api/webchat";
      const CHAT_URL = `${API_BASE}${PREFIX}/chat`;
      const ME_URL = `${API_BASE}${PREFIX}/me`;
      const SITE_URL = `${API_BASE}${PREFIX}/site`;

      const LS = {
        token: "wcg.token",
        username: "wcg.username",
        sessionId: "wcg.sessionId",
      };
      const SS = {
        history: "wcg.history",
      };

      // No token in localStorage → user hasn't logged in. Bounce to /login
      // before rendering anything else; replace() avoids stacking history.
      const savedToken = (localStorage.getItem(LS.token) || "").trim();
      if (!savedToken) {
        location.replace("/login");
        return;
      }

      const $ = (id) => document.getElementById(id);
      const inputEl = $("input");
      const sendBtn = $("send");
      const msgs = $("messages");
      const badge = $("quotaBadge");
      const whoEl = $("who");

      const username = (localStorage.getItem(LS.username) || "Friend").trim() || "Friend";
      whoEl.innerHTML = `你好，<strong></strong>`;
      whoEl.querySelector("strong").textContent = username;
      whoEl.hidden = false;

      let sessionId = localStorage.getItem(LS.sessionId);
      if (!sessionId) {
        sessionId = (crypto.randomUUID && crypto.randomUUID()) || String(Date.now());
        localStorage.setItem(LS.sessionId, sessionId);
      }

      // hydrate history (per-tab)
      const history = JSON.parse(sessionStorage.getItem(SS.history) || "[]");
      for (const item of history) {
        addMessage(item.role, item.text, { skipPersist: true });
      }
      scrollToEnd();

      // Operator branding (best-effort).
      (async () => {
        try {
          const resp = await fetch(SITE_URL, { credentials: "same-origin" });
          if (!resp.ok) return;
          const data = await resp.json();
          const name = (data.site_name || "").trim() || "WebChat Gateway";
          document.title = `${name} · Chat`;
          document.getElementById("brandName").textContent = name;
        } catch { /* keep defaults */ }
      })();

      // Quota probe: fires on every page load (including refresh) so the
      // badge has a value before the first message round-trip. 401 means
      // the saved token was revoked since last visit — treat the same as
      // a logout and bounce back to /login.
      (async () => {
        try {
          const resp = await fetch(ME_URL, {
            headers: { Authorization: `Bearer ${savedToken}` },
            credentials: "same-origin",
          });
          if (resp.status === 401) {
            localStorage.removeItem(LS.token);
            location.replace("/login");
            return;
          }
          if (!resp.ok) return;
          const data = await resp.json();
          if (typeof data.remaining === "number" && typeof data.daily_quota === "number") {
            setBadge(data.remaining, data.daily_quota);
          }
        } catch { /* leave badge as -- */ }
      })();

      function setBadge(remaining, quota) {
        if (remaining == null || quota == null) {
          badge.textContent = "--";
          badge.className = "badge";
          return;
        }
        badge.textContent = `今日剩余 ${remaining} / ${quota}`;
        const ratio = remaining / Math.max(1, quota);
        badge.className = "badge " + (ratio >= 0.3 ? "good" : ratio >= 0.1 ? "warn" : "bad");
      }

      function addMessage(role, text, opts = {}) {
        const div = document.createElement("div");
        div.className = "msg " + role;
        div.textContent = text;
        msgs.appendChild(div);
        if (!opts.skipPersist && (role === "user" || role === "bot")) {
          history.push({ role, text, ts: Date.now() });
          sessionStorage.setItem(SS.history, JSON.stringify(history));
        }
        scrollToEnd();
      }

      function scrollToEnd() {
        msgs.scrollTop = msgs.scrollHeight;
      }

      $("clearHistory").onclick = () => {
        history.length = 0;
        sessionStorage.removeItem(SS.history);
        msgs.innerHTML = "";
      };
      $("newSession").onclick = () => {
        sessionId = (crypto.randomUUID && crypto.randomUUID()) || String(Date.now());
        localStorage.setItem(LS.sessionId, sessionId);
        history.length = 0;
        sessionStorage.removeItem(SS.history);
        msgs.innerHTML = "";
        addMessage("notice", `已开启新会话: ${sessionId}`);
      };
      $("logout").onclick = () => {
        if (!confirm("登出会清除本机保存的 token 与对话历史。继续？")) return;
        localStorage.removeItem(LS.token);
        localStorage.removeItem(LS.username);
        localStorage.removeItem(LS.sessionId);
        sessionStorage.removeItem(SS.history);
        location.replace("/");
      };

      inputEl.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          send();
        }
      });
      sendBtn.onclick = send;

      async function send() {
        const message = inputEl.value.trim();
        if (!message) return;
        sendBtn.disabled = true;
        addMessage("user", message);
        inputEl.value = "";

        try {
          const resp = await fetch(CHAT_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${savedToken}`,
            },
            body: JSON.stringify({
              session_id: sessionId,
              username,
              message,
            }),
          });
          let payload;
          try { payload = await resp.json(); } catch { payload = {}; }

          if (resp.ok) {
            setBadge(payload.remaining, payload.daily_quota);
            addMessage("bot", payload.reply || "(空回复)");
            return;
          }

          const err = payload.error || `http_${resp.status}`;
          if (resp.status === 401) {
            addMessage("error", "Token 无效或已撤销，请重新登录。");
            setTimeout(() => {
              localStorage.removeItem(LS.token);
              location.replace("/login");
            }, 1500);
          } else if (resp.status === 429 && err === "quota_exceeded") {
            setBadge(0, payload.daily_quota);
            addMessage("notice", "今日额度已用完，明日 0 点重置。");
          } else if (resp.status === 429 && err === "concurrent_request") {
            addMessage("notice", "上一条还在处理中，稍候。");
          } else if (resp.status === 429 && err === "ip_blocked") {
            const retry = resp.headers.get("Retry-After") || payload.retry_after || "?";
            addMessage("error", `请求过于频繁，已暂时封禁，${retry} 秒后重试。`);
          } else if (resp.status === 400 && err === "message_too_long") {
            addMessage("error", `消息过长 (上限 ${payload.max_length})。`);
          } else if (resp.status === 403 && err === "forbidden_origin") {
            addMessage("error", "页面来源未在 allowed_origins 中。");
          } else {
            addMessage("error", `请求失败: ${err} ${payload.detail || ""}`);
          }
        } catch (error) {
          addMessage("error", `网络错误: ${String(error)}`);
        } finally {
          sendBtn.disabled = false;
        }
      }
      })();
    </script>
  </body>
</html>

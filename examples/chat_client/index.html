sgRegenSpin .8s linear infinite;pointer-events:none}@keyframes msgRegenSpin{to{transform:rotate(360deg)}}.msg-row.user-row .msg-user-failed{align-self:stretch}.msg-fold-group{align-self:stretch;display:flex;flex-direction:column;gap:6px;margin:2px 0}.msg-fold-toggle{-webkit-appearance:none;-moz-appearance:none;appearance:none;border:1px dashed color-mix(in oklab,var(--rule) 80%,transparent);background:color-mix(in oklab,var(--ink) 3%,transparent);color:var(--ink-soft);border-radius:999px;padding:4px 14px;align-self:center;display:inline-flex;align-items:center;gap:6px;font:inherit;font-size:12.5px;cursor:pointer;transition:background-color .15s ease,color .15s ease,border-color .15s ease}.msg-fold-toggle:hover{background:color-mix(in oklab,var(--ink) 7%,transparent);color:var(--ink);border-color:color-mix(in oklab,var(--rule) 100%,transparent)}.msg-fold-toggle:focus-visible{outline:2px solid var(--accent);outline-offset:2px}.msg-fold-chevron{display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;transition:transform .18s ease}.msg-fold-chevron svg{width:14px;height:14px}.msg-fold-group.expanded .msg-fold-chevron{transform:rotate(90deg)}.msg-fold-content{display:none;flex-direction:column;gap:10px;padding:2px 0}.msg-fold-group.expanded .msg-fold-content{display:flex}.msg.folded{opacity:.6;filter:saturate(.7)}.msg.folded:hover{opacity:.85}.msg-edit-inline{display:flex;flex-direction:column;gap:6px;width:100%;min-width:220px}.msg-edit-textarea{-webkit-appearance:none;-moz-appearance:none;appearance:none;border:1px solid color-mix(in oklab,var(--accent) 35%,var(--rule));background:color-mix(in oklab,var(--card) 85%,transparent);color:var(--ink);border-radius:8px;padding:6px 8px;font:inherit;line-height:1.5;resize:none;overflow-y:auto;min-height:36px;max-height:240px;scrollbar-width:none}.msg-edit-textarea::-webkit-scrollbar{display:none}.msg-edit-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--ring)}.msg-edit-actions{display:flex;justify-content:flex-end;gap:6px}.msg-edit-cancel,.msg-edit-save{-webkit-appearance:none;-moz-appearance:none;appearance:none;border:1px solid var(--rule);background:var(--card);color:var(--ink);border-radius:6px;padding:3px 12px;font:inherit;font-size:12.5px;cursor:pointer;transition:background-color .15s ease,border-color .15s ease,color .15s ease}.msg-edit-cancel:hover{background:color-mix(in oklab,var(--ink) 5%,transparent)}.msg-edit-save{background:var(--accent);color:var(--on-accent, #fff);border-color:var(--accent)}.msg-edit-save:hover{background:color-mix(in oklab,var(--accent) 85%,black);border-color:color-mix(in oklab,var(--accent) 85%,black)}.msg-edit-cancel:focus-visible,.msg-edit-save:focus-visible{outline:2px solid var(--accent);outline-offset:2px}.msg-edit-cancel:disabled,.msg-edit-save:disabled{cursor:not-allowed;opacity:.5}.msg.editing{cursor:default}@media (prefers-reduced-motion: reduce){*,*:before,*:after{transition-duration:.001ms!important;animation-duration:.001ms!important}}</style>
  </head>
  <body>
    <div class="wrap">
      <aside id="sidebar" class="sidebar" aria-label="历史对话">
        <div class="sidebar-head">
          <button id="newSessionBtn" class="sidebar-new" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            <span>新会话</span>
          </button>
        </div>
        <ul id="sessionList" class="session-list" role="list"></ul>
      </aside>
      <div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>

      <div class="main">
        <header>
          <button id="sidebarToggle" type="button" class="sidebar-toggle"
            aria-label="切换会话列表" aria-controls="sidebar" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 6h18M3 12h18M3 18h18"/>
            </svg>
          </button>
          <a class="brand" href="/" aria-label="返回首页">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
              </svg>
            </span>
          </a>
          <h1 id="brandName">WebChat Gateway</h1>
          <span id="who" class="who" hidden></span>
          <span id="syncStatus" class="badge sync-status" data-state="live" title="同步状态">实时</span>
          <span id="quotaBadge" class="badge">--</span>
          <div class="actions">
            <button id="themeToggle" type="button" class="icon-only"
              aria-label="切换深浅色" aria-pressed="false">
              <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            </button>
            <button id="clearHistory" type="button">清空</button>
            <button id="logout" type="button" class="danger" title="退出并清除本机保存的 token">登出</button>
          </div>
        </header>

        <div id="messages">
          <div id="emptyState" class="empty-state">
            <span class="empty-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
              </svg>
            </span>
            <p class="empty-title">开始一段对话</p>
            <p class="empty-hint">把想法写在下面，按 Enter 发送</p>
          </div>
        </div>

        <footer>
          <div id="composer-attachments" aria-label="附件预览"></div>
          <div class="composer-row">
            <button id="attachBtn" type="button" class="attach-btn" aria-label="添加图片" title="添加图片">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 1 1-2.83-2.83l8.49-8.48"/>
              </svg>
            </button>
            <input id="fileInput" type="file" accept="image/jpeg,image/png,image/webp,image/gif" multiple hidden />
            <textarea id="input" rows="1" placeholder="Enter 发送，Shift+Enter 换行"></textarea>
            <button id="send" type="button" data-mode="send" aria-label="发送">
              <span class="send-mode">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="m22 2-7 20-4-9-9-4 20-7Z"/>
                </svg>
                <span>发送</span>
              </span>
              <span class="stop-mode">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <rect x="6" y="6" width="12" height="12" rx="2"/>
                </svg>
                <span>停止</span>
              </span>
            </button>
          </div>
          <div id="dropOverlay" class="drop-overlay" hidden aria-hidden="true">
            <div class="drop-overlay-inner">松开以添加图片</div>
          </div>
        </footer>
      </div>
    </div>

  </body>
</html>

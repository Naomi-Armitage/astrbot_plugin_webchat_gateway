  </head>
  <body>
    <div class="wrap">
      <aside id="sidebar" class="sidebar" aria-label="历史对话">
        <div class="sidebar-head">
          <button id="newSessionBtn" class="sidebar-new" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            <span>新会话</span>
          </button>
        </div>
        <ul id="sessionList" class="session-list" role="list"></ul>
      </aside>
      <div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>

      <div class="main">
        <header>
          <button id="sidebarToggle" type="button" class="sidebar-toggle"
            aria-label="切换会话列表" aria-controls="sidebar" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 6h18M3 12h18M3 18h18"/>
            </svg>
          </button>
          <a class="brand" href="/" aria-label="返回首页">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
              </svg>
            </span>
          </a>
          <h1 id="brandName">WebChat Gateway</h1>
          <span id="who" class="who" hidden></span>
          <span id="syncStatus" class="badge sync-status" data-state="live" title="同步状态">实时</span>
          <span id="quotaBadge" class="badge">--</span>
          <div class="actions">
            <button id="themeToggle" type="button" class="icon-only"
              aria-label="切换深浅色" aria-pressed="false">
              <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            </button>
            <button id="clearHistory" type="button">清空</button>
            <button id="logout" type="button" class="danger" title="退出并清除本机保存的 token">登出</button>
          </div>
        </header>

        <div id="messages">
          <div id="emptyState" class="empty-state">
            <span class="empty-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
              </svg>
            </span>
            <p class="empty-title">开始一段对话</p>
            <p class="empty-hint">把想法写在下面，按 Enter 发送</p>
          </div>
        </div>

        <footer>
          <div id="composer-attachments" aria-label="附件预览"></div>
          <div class="composer-row">
            <div class="composer-input">
              <button id="plusBtn" type="button" class="plus-btn" aria-label="更多功能"
                aria-controls="plusMenu" aria-expanded="false" title="更多功能">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <line x1="12" y1="5" x2="12" y2="19"/>
                  <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
              </button>
              <div id="plusMenu" class="plus-menu" hidden>
                <button id="menuUpload" type="button" class="plus-menu-item">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M21.44 11.05 12.25 20.24a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 1 1-2.83-2.83l8.49-8.48"/>
                  </svg>
                  <span>上传图片</span>
                </button>
                <button id="menuImage" type="button" class="plus-menu-item" aria-pressed="false" hidden>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                    <circle cx="8.5" cy="8.5" r="1.5"/>
                    <polyline points="21 15 16 10 5 21"/>
                  </svg>
                  <span>生成图片</span>
                </button>
              </div>
              <input id="fileInput" type="file" accept="image/jpeg,image/png,image/webp,image/gif" multiple hidden />
              <textarea id="input" rows="1" placeholder="输入消息…"></textarea>
            </div>
            <button id="send" type="button" data-mode="send" aria-label="发送">
              <span class="send-mode">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="m22 2-7 20-4-9-9-4 20-7Z"/>
                </svg>
                <span>发送</span>
              </span>
              <span class="stop-mode">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <rect x="6" y="6" width="12" height="12" rx="2"/>
                </svg>
                <span>停止</span>
              </span>
            </button>
          </div>
          <div id="dropOverlay" class="drop-overlay" hidden aria-hidden="true">
            <div class="drop-overlay-inner">松开以添加图片</div>
          </div>
        </footer>
      </div>
    </div>

  </body>
</html>

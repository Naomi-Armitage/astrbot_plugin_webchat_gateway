);border-color:color-mix(in oklab,var(--bad) 40%,transparent);background:color-mix(in oklab,var(--bad) 8%,transparent)}.actions .icon-only{width:30px;height:30px;padding:0;display:inline-grid;place-items:center}.actions .icon-only svg{width:15px;height:15px}.who{font-size:12px;color:var(--ink-soft);padding:3px 10px;border:1px solid var(--rule);border-radius:999px;background:var(--card)}.who strong{color:var(--ink);font-weight:600}#messages{flex:1;overflow-y:auto;padding:72px 0 18px;display:flex;flex-direction:column;gap:10px}#messages::-webkit-scrollbar{width:8px}#messages::-webkit-scrollbar-track{background:transparent}#messages::-webkit-scrollbar-thumb{background:color-mix(in oklab,var(--ink-soft) 35%,transparent);border-radius:999px}.msg{max-width:78%;padding:10px 14px;font:14.5px/1.55 var(--font-display);white-space:pre-wrap;word-break:break-word;background:var(--card);border:1px solid var(--rule);color:var(--ink);border-radius:14px;box-shadow:0 1px 2px var(--shadow);animation:msgIn .25s cubic-bezier(.2,.8,.3,1) both}.msg.bot{align-self:flex-start;border-bottom-left-radius:4px}.msg.user{align-self:flex-end;background:var(--highlight);color:var(--on-highlight);border-color:color-mix(in oklab,var(--accent) 24%,transparent);border-bottom-right-radius:4px}.msg.error{align-self:stretch;max-width:none;background:color-mix(in oklab,var(--bad) 8%,var(--card));border-color:color-mix(in oklab,var(--bad) 30%,transparent);color:var(--bad)}.msg.notice{align-self:stretch;max-width:none;background:color-mix(in oklab,var(--warn) 8%,var(--card));border-color:color-mix(in oklab,var(--warn) 30%,transparent);color:var(--warn)}@keyframes msgIn{0%{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}.msg.typing{display:inline-flex;align-items:center;gap:5px;padding:14px 18px}.msg.typing .dot{width:7px;height:7px;border-radius:999px;background:var(--ink-soft);animation:typingDot 1.2s infinite}.msg.typing .dot:nth-child(2){animation-delay:.15s}.msg.typing .dot:nth-child(3){animation-delay:.3s}@keyframes typingDot{0%,60%,to{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}.empty-state{margin:auto;padding:32px 20px;display:flex;flex-direction:column;align-items:center;gap:14px;color:var(--ink-soft);text-align:center;animation:emptyIn .35s ease both}.empty-state .empty-icon{width:56px;height:56px;display:grid;place-items:center;background:var(--accent-soft);border:1px solid var(--rule);border-radius:16px;color:var(--accent);box-shadow:0 1px 2px var(--shadow)}.empty-state .empty-icon svg{width:26px;height:26px}.empty-state .empty-title{font:16px/1.4 var(--font-display);color:var(--ink);margin:0}.empty-state .empty-hint{font-size:13px;color:var(--ink-soft);margin:0}@keyframes emptyIn{0%{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}#messages:has(.msg) .empty-state{display:none}footer{display:flex;gap:10px;padding-top:8px}footer textarea{flex:1;min-height:36px;max-height:200px;padding:6px 12px;background:var(--card);color:var(--ink);border:1px solid var(--rule);border-radius:10px;resize:vertical;font:inherit;line-height:1.5;transition:border-color .15s ease,box-shadow .15s ease}footer textarea::placeholder{color:var(--ink-soft)}footer textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--ring)}footer button{padding:0 14px;background:var(--accent);color:#fff;border:1px solid var(--accent);border-radius:10px;font:inherit;font-weight:600;font-size:14px;cursor:pointer;box-shadow:0 1px 2px var(--shadow);display:inline-flex;align-items:center;gap:7px;transition:background .15s ease,transform .12s ease,box-shadow .15s ease}footer button svg{width:14px;height:14px}footer button:hover:not(:disabled){background:var(--accent-strong);border-color:var(--accent-strong);box-shadow:0 2px 4px var(--shadow-strong)}footer button:active:not(:disabled){transform:translateY(1px)}footer button:disabled{opacity:.5;cursor:not-allowed}@media (max-width: 719px){.main{padding:   </head>
  <body>
    <div class="wrap">
      <aside id="sidebar" class="sidebar" aria-label="历史对话">
        <div class="sidebar-head">
          <button id="newSessionBtn" class="sidebar-new" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            <span>新会话</span>
          </button>
        </div>
        <ul id="sessionList" class="session-list" role="list"></ul>
      </aside>
      <div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>

      <div class="main">
        <header>
          <button id="sidebarToggle" type="button" class="sidebar-toggle"
            aria-label="切换会话列表" aria-controls="sidebar" aria-expanded="false">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 6h18M3 12h18M3 18h18"/>
            </svg>
          </button>
          <a class="brand" href="/" aria-label="返回首页">
            <span class="brand-mark" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
              </svg>
            </span>
          </a>
          <h1 id="brandName">WebChat Gateway</h1>
          <span id="who" class="who" hidden></span>
          <span id="syncStatus" class="badge sync-status" data-state="live" title="同步状态">实时</span>
          <span id="quotaBadge" class="badge">--</span>
          <div class="actions">
            <button id="themeToggle" type="button" class="icon-only"
              aria-label="切换深浅色" aria-pressed="false">
              <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            </button>
            <button id="clearHistory" type="button">清空</button>
            <button id="logout" type="button" class="danger" title="退出并清除本机保存的 token">登出</button>
          </div>
        </header>

        <div id="messages">
          <div id="emptyState" class="empty-state">
            <span class="empty-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
              </svg>
            </span>
            <p class="empty-title">开始一段对话</p>
            <p class="empty-hint">把想法写在下面，按 Enter 发送</p>
          </div>
        </div>

        <footer>
          <textarea id="input" rows="1" placeholder="Enter 发送，Shift+Enter 换行"></textarea>
          <button id="send">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="m22 2-7 20-4-9-9-4 20-7Z"/>
            </svg>
            <span>发送</span>
          </button>
        </footer>
      </div>
    </div>

  </body>
</html>

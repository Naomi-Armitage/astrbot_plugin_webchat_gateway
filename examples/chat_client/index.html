<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>WebChat Gateway · Chat</title>
    <script>
      // Sync theme init: runs before <style> applies, so the correct
      // :root[data-theme="..."] block wins from first paint (no flash).
      // Family default is classic (matches operator-side default in
      // _conf_schema.json); mode follows OS unless the user toggled.
      (function(){
        try {
          var family = localStorage.getItem("wcg.theme.family") || "classic";
          var mode = localStorage.getItem("wcg.theme.mode")
            || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
          var t = family === "notebook"
            ? (mode === "dark" ? "midnight" : "paper")
            : (mode === "dark" ? "classic-dark" : "classic-light");
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "classic-light");
        }
      })();
    </script>
    <style>
      /* ----- design tokens ----- */
      :root[data-theme="paper"] {
        --paper:        #fafaf9;
        --paper-deep:   #f5f5f4;
        --rule:         #e7e5e4;
        --ink:          #1c1917;
        --ink-soft:     #57534e;
        --card:         #ffffff;
        --accent:       #1d4ed8;
        --accent-strong:#1e3a8a;
        --accent-soft:  rgba(29, 78, 216, 0.10);
        --highlight:    #dbeafe;
        --on-highlight: #1e3a8a;
        --good:         #15803d;
        --warn:         #a16207;
        --bad:          #b91c1c;
        --shadow:       rgba(28, 25, 23, 0.06);
        --shadow-strong:rgba(28, 25, 23, 0.10);
        --ring:         rgba(29, 78, 216, 0.20);
        --glow-a:       rgba(29, 78, 216, 0.10);
        --glow-b:       rgba(99, 102, 241, 0.07);
      }
      :root[data-theme="midnight"] {
        --paper:        #000000;
        --paper-deep:   #141828;
        --rule:         #262c3e;
        --ink:          #f5f5f7;
        --ink-soft:     #9ca3af;
        --card:         #161b2a;
        --accent:       #60a5fa;
        --accent-strong:#3b82f6;
        --accent-soft:  rgba(96, 165, 250, 0.14);
        --highlight:    #1e3a8a;
        --on-highlight: #dbeafe;
        --good:         #22c55e;
        --warn:         #eab308;
        --bad:          #f87171;
        --shadow:       rgba(0, 0, 0, 0.30);
        --shadow-strong:rgba(0, 0, 0, 0.50);
        --ring:         rgba(96, 165, 250, 0.30);
        --glow-a:       rgba(96, 165, 250, 0.32);
        --glow-b:       rgba(168, 85, 247, 0.22);
      }
      :root,
      :root[data-theme="classic-light"] {
        --paper:        #ffffff;
        --paper-deep:   #f6f8fa;
        --rule:         #d0d7de;
        --ink:          #0a0c10;
        --ink-soft:     #59636e;
        --card:         #ffffff;
        --accent:       #6639ba;
        --accent-strong:#5226a3;
        --accent-soft:  rgba(102, 57, 186, 0.10);
        --highlight:    rgba(102, 57, 186, 0.10);
        --on-highlight: #5226a3;
        --good:         #1a7f37;
        --warn:         #9a6700;
        --bad:          #cf222e;
        --shadow:       rgba(31, 35, 40, 0.06);
        --shadow-strong:rgba(31, 35, 40, 0.10);
        --ring:         rgba(102, 57, 186, 0.25);
        --glow-a:       rgba(102, 57, 186, 0.08);
        --glow-b:       rgba(99, 102, 241, 0.05);
      }
      :root[data-theme="classic-dark"] {
        --paper:        #0d1117;
        --paper-deep:   #1c2330;
        --rule:         #30363d;
        --ink:          #f0f6fc;
        --ink-soft:     #8b949e;
        --card:         #161b22;
        --accent:       #a371f7;
        --accent-strong:#b692ff;
        --accent-soft:  rgba(163, 113, 247, 0.14);
        --highlight:    #2f1c5e;
        --on-highlight: #f3eaff;
        --good:         #3fb950;
        --warn:         #d29922;
        --bad:          #f85149;
        --shadow:       rgba(0, 0, 0, 0.25);
        --shadow-strong:rgba(0, 0, 0, 0.45);
        --ring:         rgba(163, 113, 247, 0.30);
        --glow-a:       rgba(163, 113, 247, 0.22);
        --glow-b:       rgba(120, 80, 200, 0.14);
      }
      :root {
        --font-display: "Comic Sans MS", "Comic Neue", "Chalkboard SE", "Marker Felt", system-ui, sans-serif;
        --font-ui:      system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, "Helvetica Neue", sans-serif;
      }

      /* ----- base ----- */
      * { box-sizing: border-box; }
      html, body { background: var(--paper); }
      body {
        margin: 0;
        font: 15px/1.55 var(--font-ui);
        color: var(--ink);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        background:
          radial-gradient(ellipse 900px 600px at 5% 0%, var(--glow-a), transparent 55%),
          radial-gradient(ellipse 800px 600px at 95% 100%, var(--glow-b), transparent 55%),
          var(--paper);
        background-attachment: fixed;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { color: var(--accent-strong); text-decoration: underline; }

      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 18px 20px;
        display: flex;
        flex-direction: column;
        height: 100vh;
        height: 100dvh;
      }

      /* ----- header ----- */
      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding-bottom: 14px;
        border-bottom: 1px solid var(--rule);
      }
      .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
      .brand-mark {
        width: 30px; height: 30px;
        display: grid; place-items: center;
        background: var(--accent-soft);
        border: 1px solid var(--rule);
        border-radius: 8px;
        transition: background .15s ease;
      }
      .brand:hover .brand-mark { background: color-mix(in oklab, var(--accent) 18%, transparent); }
      .brand-mark svg { width: 15px; height: 15px; color: var(--accent-strong); }

      header h1 {
        font-family: var(--font-display);
        font-size: 16px;
        margin: 0;
        flex: 1;
        font-weight: 600;
        color: var(--ink);
        letter-spacing: -0.005em;
      }

      .badge {
        font-size: 11.5px;
        padding: 3px 10px;
        border-radius: 999px;
        background: var(--card);
        border: 1px solid var(--rule);
        color: var(--ink-soft);
        font-weight: 500;
      }
      .badge.good { background: color-mix(in oklab, var(--good) 12%, transparent); border-color: color-mix(in oklab, var(--good) 35%, transparent); color: var(--good); }
      .badge.warn { background: color-mix(in oklab, var(--warn) 12%, transparent); border-color: color-mix(in oklab, var(--warn) 35%, transparent); color: var(--warn); }
      .badge.bad  { background: color-mix(in oklab, var(--bad)  12%, transparent); border-color: color-mix(in oklab, var(--bad)  35%, transparent); color: var(--bad);  }

      .actions { display: flex; gap: 6px; }
      .actions a, .actions button {
        font: inherit;
        background: transparent;
        border: 1px solid var(--rule);
        color: var(--ink-soft);
        padding: 5px 11px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 12.5px;
        font-weight: 500;
        text-decoration: none !important;
        transition: color .15s ease, border-color .15s ease, background .15s ease;
      }
      .actions a:hover, .actions button:hover {
        color: var(--ink);
        border-color: color-mix(in oklab, var(--ink-soft) 50%, var(--rule));
        background: var(--paper-deep);
      }
      .actions .danger:hover {
        color: var(--bad);
        border-color: color-mix(in oklab, var(--bad) 40%, transparent);
        background: color-mix(in oklab, var(--bad) 8%, transparent);
      }
      .actions .icon-only {
        width: 30px; height: 30px;
        padding: 0;
        display: inline-grid; place-items: center;
      }
      .actions .icon-only svg { width: 15px; height: 15px; }

      .who {
        font-size: 12px;
        color: var(--ink-soft);
        padding: 3px 10px;
        border: 1px solid var(--rule);
        border-radius: 999px;
        background: var(--card);
      }
      .who strong { color: var(--ink); font-weight: 600; }

      /* ----- messages ----- */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 18px 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      #messages::-webkit-scrollbar { width: 8px; }
      #messages::-webkit-scrollbar-track { background: transparent; }
      #messages::-webkit-scrollbar-thumb {
        background: color-mix(in oklab, var(--ink-soft) 35%, transparent);
        border-radius: 999px;
      }

      .msg {
        max-width: 78%;
        padding: 10px 14px;
        font: 14.5px/1.55 var(--font-display);
        white-space: pre-wrap;
        word-break: break-word;
        background: var(--card);
        border: 1px solid var(--rule);
        color: var(--ink);
        border-radius: 14px;
        box-shadow: 0 1px 2px var(--shadow);
        animation: msgIn .25s cubic-bezier(.2,.8,.3,1) both;
      }
      .msg.bot  { align-self: flex-start; border-bottom-left-radius: 4px; }
      .msg.user {
        align-self: flex-end;
        background: var(--highlight);
        color: var(--on-highlight);
        border-color: color-mix(in oklab, var(--accent) 24%, transparent);
        border-bottom-right-radius: 4px;
      }
      .msg.error {
        align-self: stretch;
        max-width: none;
        background: color-mix(in oklab, var(--bad) 8%, var(--card));
        border-color: color-mix(in oklab, var(--bad) 30%, transparent);
        color: var(--bad);
      }
      .msg.notice {
        align-self: stretch;
        max-width: none;
        background: color-mix(in oklab, var(--warn) 8%, var(--card));
        border-color: color-mix(in oklab, var(--warn) 30%, transparent);
        color: var(--warn);
      }

      @keyframes msgIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ----- typing indicator ----- */
      .msg.typing {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 14px 18px;
      }
      .msg.typing .dot {
        width: 7px; height: 7px;
        border-radius: 999px;
        background: var(--ink-soft);
        animation: typingDot 1.2s infinite;
      }
      .msg.typing .dot:nth-child(2) { animation-delay: 0.15s; }
      .msg.typing .dot:nth-child(3) { animation-delay: 0.30s; }
      @keyframes typingDot {
        0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
        30%           { opacity: 1;   transform: translateY(-3px); }
      }

      /* ----- empty state ----- */
      .empty-state {
        margin: auto;
        padding: 32px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 14px;
        color: var(--ink-soft);
        text-align: center;
        animation: emptyIn .35s ease both;
      }
      .empty-state .empty-icon {
        width: 56px; height: 56px;
        display: grid; place-items: center;
        background: var(--accent-soft);
        border: 1px solid var(--rule);
        border-radius: 16px;
        color: var(--accent);
        box-shadow: 0 1px 2px var(--shadow);
      }
      .empty-state .empty-icon svg { width: 26px; height: 26px; }
      .empty-state .empty-title {
        font: 16px/1.4 var(--font-display);
        color: var(--ink);
        margin: 0;
      }
      .empty-state .empty-hint {
        font-size: 13px;
        color: var(--ink-soft);
        margin: 0;
      }
      @keyframes emptyIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      /* hide empty state once any sibling .msg appears */
      #messages:has(.msg) .empty-state { display: none; }
      /* in classic family, swap to system-ui for the title */
      [data-theme^="classic"] .empty-state .empty-title {
        font-family: var(--font-ui);
        font-weight: 600;
      }

      /* ----- footer / composer ----- */
      footer {
        display: flex;
        gap: 10px;
        padding-top: 14px;
        border-top: 1px solid var(--rule);
      }
      footer textarea {
        flex: 1;
        min-height: 60px;
        max-height: 200px;
        padding: 10px 14px;
        background: var(--card);
        color: var(--ink);
        border: 1px solid var(--rule);
        border-radius: 10px;
        resize: vertical;
        font: inherit;
        line-height: 1.5;
        transition: border-color .15s ease, box-shadow .15s ease;
      }
      footer textarea::placeholder { color: var(--ink-soft); }
      footer textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--ring);
      }
      footer button {
        padding: 0 20px;
        background: var(--accent);
        color: #fff;
        border: 1px solid var(--accent);
        border-radius: 10px;
        font: inherit;
        font-weight: 600;
        font-size: 14px;
        cursor: pointer;
        box-shadow: 0 1px 2px var(--shadow);
        display: inline-flex;
        align-items: center;
        gap: 7px;
        transition: background .15s ease, transform .12s ease, box-shadow .15s ease;
      }
      footer button svg { width: 14px; height: 14px; }
      footer button:hover:not(:disabled) {
        background: var(--accent-strong);
        border-color: var(--accent-strong);
        box-shadow: 0 2px 4px var(--shadow-strong);
      }
      footer button:active:not(:disabled) { transform: translateY(1px); }
      footer button:disabled { opacity: .5; cursor: not-allowed; }

      /* ----- mobile ----- */
      @media (max-width: 600px) {
        .wrap { padding: 12px 14px calc(12px + env(safe-area-inset-bottom)); }
        header { flex-wrap: wrap; gap: 8px; padding-bottom: 10px; }
        header h1 {
          flex: 1 1 auto;
          min-width: 0;
          font-size: 13.5px;
          overflow: hidden;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .who { display: none; }
        .actions { flex: 1 0 100%; justify-content: flex-end; }
        .actions a, .actions button { padding: 4px 9px; font-size: 12px; }
        #messages { padding: 14px 0; gap: 8px; }
        .msg { max-width: 86%; padding: 9px 12px; font-size: 14px; }
        footer { gap: 8px; padding-top: 10px; }
        footer textarea {
          min-height: 44px;
          max-height: 120px;
          font-size: 16px; /* prevent iOS Safari auto-zoom on focus */
          resize: none;
        }
        footer button { padding: 0 16px; font-size: 14px; }
      }

      /* ---------- Classic family overrides ----------
         Classic stays close to base now (the base IS soft-UI clean), so
         only color-driven tweaks needed: GitHub-style flat user bubbles,
         remove the comic-font on messages for a more uniform feel. */
      [data-theme^="classic"] header h1 {
        font-family: var(--font-ui);
        font-size: 14px;
        font-weight: 600;
      }
      [data-theme^="classic"] .msg {
        font-family: var(--font-ui);
        font-size: 14px;
      }
      [data-theme^="classic"] .msg.user {
        background: var(--highlight);
        color: var(--on-highlight);
        border-color: color-mix(in oklab, var(--accent) 30%, transparent);
      }
      [data-theme^="classic-dark"] .msg.user {
        border-color: color-mix(in oklab, var(--accent) 45%, transparent);
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          transition-duration: 0.001ms !important;
          animation-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a class="brand" href="/" aria-label="返回首页">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
          </span>
        </a>
        <h1 id="brandName">WebChat Gateway</h1>
        <span id="who" class="who" hidden></span>
        <span id="quotaBadge" class="badge">--</span>
        <div class="actions">
          <button id="themeToggle" type="button" class="icon-only"
            aria-label="切换深浅色" aria-pressed="false">
            <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
          <button id="newSession" type="button">新会话</button>
          <button id="clearHistory" type="button">清空</button>
          <button id="logout" type="button" class="danger" title="退出并清除本机保存的 token">登出</button>
        </div>
      </header>

      <div id="messages">
        <div id="emptyState" class="empty-state">
          <span class="empty-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
          </span>
          <p class="empty-title">开始一段对话</p>
          <p class="empty-hint">把想法写在下面，按 Enter 发送</p>
        </div>
      </div>

      <footer>
        <textarea id="input" placeholder="输入消息后按 Enter 发送，Shift+Enter 换行"></textarea>
        <button id="send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="m22 2-7 20-4-9-9-4 20-7Z"/>
          </svg>
          <span>发送</span>
        </button>
      </footer>
    </div>

    <script>
      (() => {
      const API_BASE = "";
      const PREFIX = "/api/webchat";
      const CHAT_URL = `${API_BASE}${PREFIX}/chat`;
      const ME_URL = `${API_BASE}${PREFIX}/me`;
      const SITE_URL = `${API_BASE}${PREFIX}/site`;

      const LS = {
        token: "wcg.token",
        username: "wcg.username",
        sessionId: "wcg.sessionId",
      };
      const SS = {
        history: "wcg.history",
      };

      // No token in localStorage → user hasn't logged in. Bounce to /login
      // before rendering anything else; replace() avoids stacking history.
      const savedToken = (localStorage.getItem(LS.token) || "").trim();
      if (!savedToken) {
        location.replace("/login");
        return;
      }

      const $ = (id) => document.getElementById(id);
      const inputEl = $("input");
      const sendBtn = $("send");
      const msgs = $("messages");
      const badge = $("quotaBadge");
      const whoEl = $("who");

      const username = (localStorage.getItem(LS.username) || "Friend").trim() || "Friend";
      whoEl.innerHTML = `你好，<strong></strong>`;
      whoEl.querySelector("strong").textContent = username;
      whoEl.hidden = false;

      let sessionId = localStorage.getItem(LS.sessionId);
      if (!sessionId) {
        sessionId = (crypto.randomUUID && crypto.randomUUID()) || String(Date.now());
        localStorage.setItem(LS.sessionId, sessionId);
      }

      // hydrate history (per-tab)
      const history = JSON.parse(sessionStorage.getItem(SS.history) || "[]");
      for (const item of history) {
        addMessage(item.role, item.text, { skipPersist: true });
      }
      scrollToEnd();

      // Operator branding (best-effort).
      (async function loadSite() {
        try {
          const resp = await fetch(SITE_URL, { credentials: "same-origin" });
          if (!resp.ok) return;
          const data = await resp.json();
          const name = (data.site_name || "").trim() || "WebChat Gateway";
          document.title = `${name} · Chat`;
          document.getElementById("brandName").textContent = name;
          const family = (data.theme_family === "classic") ? "classic" : "notebook";
          const stored = localStorage.getItem("wcg.theme.family");
          if (stored !== family) {
            try { localStorage.setItem("wcg.theme.family", family); } catch {}
            const cur = document.documentElement.getAttribute("data-theme");
            const isDark = cur === "midnight" || cur === "classic-dark";
            const mode = isDark ? "dark" : "light";
            const resolved = family === "classic"
              ? (mode === "dark" ? "classic-dark" : "classic-light")
              : (mode === "dark" ? "midnight" : "paper");
            if (resolved !== cur) {
              document.documentElement.setAttribute("data-theme", resolved);
            }
          }
        } catch { /* keep defaults */ }
      })();

      // Quota probe: fires on every page load (including refresh) so the
      // badge has a value before the first message round-trip. 401 means
      // the saved token was revoked since last visit — treat the same as
      // a logout and bounce back to /login.
      (async () => {
        try {
          const resp = await fetch(ME_URL, {
            headers: { Authorization: `Bearer ${savedToken}` },
            credentials: "same-origin",
          });
          if (resp.status === 401) {
            localStorage.removeItem(LS.token);
            location.replace("/login");
            return;
          }
          if (!resp.ok) return;
          const data = await resp.json();
          if (typeof data.remaining === "number" && typeof data.daily_quota === "number") {
            setBadge(data.remaining, data.daily_quota);
          }
        } catch { /* leave badge as -- */ }
      })();

      function setBadge(remaining, quota) {
        if (remaining == null || quota == null) {
          badge.textContent = "--";
          badge.className = "badge";
          return;
        }
        badge.textContent = `今日剩余 ${remaining} / ${quota}`;
        const ratio = remaining / Math.max(1, quota);
        badge.className = "badge " + (ratio >= 0.3 ? "good" : ratio >= 0.1 ? "warn" : "bad");
      }

      function addMessage(role, text, opts = {}) {
        hideTyping();
        const div = document.createElement("div");
        div.className = "msg " + role;
        div.textContent = text;
        msgs.appendChild(div);
        if (!opts.skipPersist && (role === "user" || role === "bot")) {
          history.push({ role, text, ts: Date.now() });
          sessionStorage.setItem(SS.history, JSON.stringify(history));
        }
        scrollToEnd();
      }

      function scrollToEnd() {
        msgs.scrollTop = msgs.scrollHeight;
      }

      // Removes only .msg children, preserving the empty-state placeholder.
      function clearMsgList() {
        msgs.querySelectorAll(".msg").forEach((m) => m.remove());
      }

      // Inserts an animated typing indicator (only one at a time).
      function showTyping() {
        if (document.getElementById("_typing")) return;
        const t = document.createElement("div");
        t.id = "_typing";
        t.className = "msg bot typing";
        t.setAttribute("aria-label", "对方正在输入");
        t.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
        msgs.appendChild(t);
        scrollToEnd();
      }
      function hideTyping() {
        const t = document.getElementById("_typing");
        if (t) t.remove();
      }

      $("clearHistory").onclick = () => {
        history.length = 0;
        sessionStorage.removeItem(SS.history);
        clearMsgList();
      };
      $("newSession").onclick = () => {
        sessionId = (crypto.randomUUID && crypto.randomUUID()) || String(Date.now());
        localStorage.setItem(LS.sessionId, sessionId);
        history.length = 0;
        sessionStorage.removeItem(SS.history);
        clearMsgList();
        addMessage("notice", `已开启新会话: ${sessionId}`);
      };
      $("logout").onclick = () => {
        if (!confirm("登出会清除本机保存的 token 与对话历史。继续？")) return;
        localStorage.removeItem(LS.token);
        localStorage.removeItem(LS.username);
        localStorage.removeItem(LS.sessionId);
        sessionStorage.removeItem(SS.history);
        location.replace("/");
      };

      // Light/dark toggle. Init script in <head> already resolved the
      // theme on first paint; this just wires the button to flip mode.
      // Family (notebook vs classic) is set via settings, not here.
      (function setupThemeToggle() {
        const btn = $("themeToggle");
        const icon = $("themeIcon");
        const sunPath = '<path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="4"/>';
        const moonPath = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
        function resolveTheme(mode) {
          const family = localStorage.getItem("wcg.theme.family") || "notebook";
          if (family === "classic") return mode === "dark" ? "classic-dark" : "classic-light";
          return mode === "dark" ? "midnight" : "paper";
        }
        function applyMode(mode, persist) {
          document.documentElement.setAttribute("data-theme", resolveTheme(mode));
          icon.innerHTML = mode === "dark" ? moonPath : sunPath;
          btn.setAttribute("aria-pressed", String(mode === "dark"));
          if (persist) {
            try { localStorage.setItem("wcg.theme.mode", mode); } catch {}
          }
        }
        const cur = document.documentElement.getAttribute("data-theme");
        const initialMode = (cur === "midnight" || cur === "classic-dark") ? "dark" : "light";
        applyMode(initialMode, false);
        btn.addEventListener("click", () => {
          const isDark = btn.getAttribute("aria-pressed") === "true";
          applyMode(isDark ? "light" : "dark", true);
        });
      })();

      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey && !e.isComposing && e.keyCode !== 229) {
          e.preventDefault();
          send();
        }
      });
      sendBtn.onclick = send;

      async function send() {
        const message = inputEl.value.trim();
        if (!message) return;
        sendBtn.disabled = true;
        addMessage("user", message);
        inputEl.value = "";
        showTyping();

        try {
          const resp = await fetch(CHAT_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${savedToken}`,
            },
            body: JSON.stringify({
              session_id: sessionId,
              username,
              message,
            }),
          });
          let payload;
          try { payload = await resp.json(); } catch { payload = {}; }

          if (resp.ok) {
            setBadge(payload.remaining, payload.daily_quota);
            addMessage("bot", payload.reply || "(空回复)");
            return;
          }

          const err = payload.error || `http_${resp.status}`;
          if (resp.status === 401) {
            addMessage("error", "Token 无效或已撤销，请重新登录。");
            setTimeout(() => {
              localStorage.removeItem(LS.token);
              location.replace("/login");
            }, 1500);
          } else if (resp.status === 429 && err === "quota_exceeded") {
            setBadge(0, payload.daily_quota);
            addMessage("notice", "今日额度已用完，明日 0 点重置。");
          } else if (resp.status === 429 && err === "concurrent_request") {
            addMessage("notice", "上一条还在处理中，稍候。");
          } else if (resp.status === 429 && err === "ip_blocked") {
            const retry = resp.headers.get("Retry-After") || payload.retry_after || "?";
            addMessage("error", `请求过于频繁，已暂时封禁，${retry} 秒后重试。`);
          } else if (resp.status === 400 && err === "message_too_long") {
            addMessage("error", `消息过长 (上限 ${payload.max_length})。`);
          } else if (resp.status === 403 && err === "forbidden_origin") {
            addMessage("error", "页面来源未在 allowed_origins 中。");
          } else {
            addMessage("error", `请求失败: ${err} ${payload.detail || ""}`);
          }
        } catch (error) {
          addMessage("error", `网络错误: ${String(error)}`);
        } finally {
          hideTyping();
          sendBtn.disabled = false;
        }
      }
      })();
    </script>
  </body>
</html>

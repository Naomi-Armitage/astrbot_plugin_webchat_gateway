<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebChat Gateway</title>
    <meta name="description" content="WebChat Gateway 入口" />
    <meta name="robots" content="noindex" />
    <style>
      :root[data-theme="dark"] {
        --bg: #0d1117;
        --bg-elev: #0b0f15;
        --surface: #161b22;
        --surface-2: #1c2330;
        --border: #30363d;
        --border-soft: #21262d;
        --text: #e6edf3;
        --text-strong: #f0f6fc;
        --muted: #8b949e;
        --accent: #a371f7;
        --accent-strong: #b692ff;
        --accent-soft: rgba(163, 113, 247, 0.14);
        --good: #3fb950;
        --warn: #d29922;
        --bad: #f85149;
        --grid: rgba(139, 148, 158, 0.08);
      }
      :root[data-theme="light"] {
        --bg: #ffffff;
        --bg-elev: #f6f8fa;
        --surface: #ffffff;
        --surface-2: #f6f8fa;
        --border: #d0d7de;
        --border-soft: #eaeef2;
        --text: #1f2328;
        --text-strong: #0a0c10;
        --muted: #59636e;
        --accent: #6639ba;
        --accent-strong: #5226a3;
        --accent-soft: rgba(102, 57, 186, 0.10);
        --good: #1a7f37;
        --warn: #9a6700;
        --bad: #cf222e;
        --grid: rgba(31, 35, 40, 0.06);
      }

      *, *::before, *::after { box-sizing: border-box; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font: 15px/1.6 "Comic Sans MS", "Comic Neue", "Chalkboard SE", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
      }
      a { color: var(--accent-strong); text-decoration: none; }
      a:hover { text-decoration: underline; }
      h1, h2, h3 { color: var(--text-strong); margin: 0; letter-spacing: -0.01em; }
      h1 { font-size: clamp(36px, 5.4vw, 60px); line-height: 1.05; letter-spacing: -0.025em; font-weight: 700; }
      h2 { font-size: clamp(24px, 3vw, 32px); font-weight: 650; letter-spacing: -0.015em; }
      h3 { font-size: 17px; font-weight: 600; }
      p  { margin: 0; color: var(--text); }

      .container { max-width: 1120px; margin: 0 auto; padding: 0 24px; }

      /* ---------- nav ---------- */
      .nav {
        position: sticky;
        top: 0;
        z-index: 50;
        background: color-mix(in oklab, var(--bg) 80%, transparent);
        backdrop-filter: saturate(140%) blur(10px);
        -webkit-backdrop-filter: saturate(140%) blur(10px);
        border-bottom: 1px solid var(--border-soft);
      }
      .nav-inner {
        display: flex;
        align-items: center;
        gap: 16px;
        height: 60px;
      }
      .brand {
        display: flex; align-items: center; gap: 10px;
        font-weight: 600; color: var(--text-strong);
        text-decoration: none;
      }
      .brand:hover { text-decoration: none; }
      .brand-mark {
        width: 28px; height: 28px;
        display: grid; place-items: center;
        background: var(--accent-soft);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .brand-mark svg { width: 16px; height: 16px; color: var(--accent-strong); }
      .nav-actions {
        margin-left: auto;
        display: flex; align-items: center; gap: 6px;
      }
      .icon-btn {
        display: inline-grid; place-items: center;
        width: 34px; height: 34px;
        font: inherit;
        color: var(--muted);
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 8px;
        cursor: pointer;
      }
      .icon-btn:hover { color: var(--text-strong); background: var(--surface); text-decoration: none; }
      .icon-btn svg { width: 16px; height: 16px; }

      /* ---------- buttons ---------- */
      .btn {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 12px 20px;
        font: inherit; font-weight: 600;
        border-radius: 9px;
        cursor: pointer;
        text-decoration: none !important;
        border: 1px solid transparent;
        transition: transform .12s ease, background .15s ease, border-color .15s ease;
      }
      .btn:active { transform: translateY(1px); }
      .btn-primary {
        background: var(--accent);
        color: #fff !important;
        border-color: var(--accent);
      }
      .btn-primary:hover { background: var(--accent-strong); border-color: var(--accent-strong); }
      .btn-ghost {
        background: var(--surface);
        color: var(--text-strong) !important;
        border-color: var(--border);
      }
      .btn-ghost:hover { background: var(--surface-2); }

      /* ---------- hero ---------- */
      .hero {
        position: relative;
        padding: 96px 0 80px;
        overflow: hidden;
      }
      .hero-bg {
        position: absolute; inset: 0;
        pointer-events: none;
        background:
          radial-gradient(60% 50% at 50% 0%, var(--accent-soft) 0%, transparent 60%),
          linear-gradient(var(--grid) 1px, transparent 1px) 0 0 / 48px 48px,
          linear-gradient(90deg, var(--grid) 1px, transparent 1px) 0 0 / 48px 48px;
        mask-image: radial-gradient(ellipse at 50% 30%, #000 40%, transparent 75%);
        -webkit-mask-image: radial-gradient(ellipse at 50% 30%, #000 40%, transparent 75%);
      }
      .hero-inner {
        position: relative;
        display: grid;
        gap: 22px;
        max-width: 760px;
      }
      .hero-pill {
        display: inline-flex; align-items: center; gap: 8px;
        padding: 5px 12px;
        font-size: 12px;
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 999px;
        color: var(--muted);
        width: fit-content;
      }
      .hero-pill .dot {
        width: 6px; height: 6px; border-radius: 999px;
        background: var(--good);
        box-shadow: 0 0 0 3px color-mix(in oklab, var(--good) 25%, transparent);
      }
      .hero p.sub {
        color: var(--muted);
        font-size: 18px;
        max-width: 620px;
      }
      .hero p.sub:empty { display: none; }
      .hero-cta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
      .hero-cta .btn-primary { padding: 14px 24px; font-size: 16px; }
      .hero-cta .hint {
        color: var(--muted);
        font-size: 13px;
        margin-left: 6px;
      }

      /* ---------- sections ---------- */
      section.usage { padding: 56px 0 96px; }
      .section-head {
        max-width: 720px; margin-bottom: 28px;
        display: grid; gap: 8px;
      }
      .eyebrow {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--accent-strong);
      }
      .section-head p { color: var(--muted); }

      .features {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }
      .feature {
        background: var(--surface);
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        padding: 22px;
        transition: border-color .15s ease, transform .15s ease;
      }
      .feature:hover { border-color: var(--border); transform: translateY(-2px); }
      .feature-icon {
        width: 36px; height: 36px;
        display: grid; place-items: center;
        background: var(--accent-soft);
        color: var(--accent-strong);
        border-radius: 9px;
        margin-bottom: 14px;
      }
      .feature-icon svg { width: 18px; height: 18px; }
      .feature h3 { margin-bottom: 6px; }
      .feature p { color: var(--muted); font-size: 14px; }

      /* ---------- footer ---------- */
      footer {
        margin-top: 24px;
        border-top: 1px solid var(--border-soft);
        padding: 24px 0 36px;
        color: var(--muted);
        font-size: 13px;
      }
      .foot-row {
        display: flex; flex-wrap: wrap; gap: 16px;
        align-items: center;
      }
      .foot-row .spacer { flex: 1; }
      .foot-row a { color: var(--muted); }
      .foot-row a:hover { color: var(--text-strong); }

      ::selection { background: color-mix(in oklab, var(--accent) 35%, transparent); }

      /* ---------- responsive ---------- */
      @media (max-width: 920px) {
        .features { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 620px) {
        .hero { padding: 64px 0 56px; }
        .features { grid-template-columns: 1fr; }
      }

      @media (prefers-reduced-motion: reduce) {
        html { scroll-behavior: auto; }
        *, *::before, *::after {
          transition-duration: 0.001ms !important;
          animation-duration: 0.001ms !important;
        }
        .feature:hover { transform: none; }
        .btn:active { transform: none; }
      }
    </style>
  </head>
  <body>
    <header class="nav">
      <div class="container nav-inner">
        <a class="brand" href="/" aria-label="首页">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
          </span>
          <span id="brandName">WebChat Gateway</span>
        </a>
        <div class="nav-actions">
          <a id="githubLink" class="icon-btn" hidden
             href="https://github.com/Naomi-Armitage/astrbot_plugin_webchat_gateway"
             target="_blank" rel="noopener" aria-label="GitHub">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 .5C5.7.5.5 5.7.5 12c0 5.1 3.3 9.4 7.9 10.9.6.1.8-.3.8-.6v-2c-3.2.7-3.9-1.4-3.9-1.4-.5-1.3-1.3-1.7-1.3-1.7-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.7 1.3 3.4 1 .1-.7.4-1.3.7-1.6-2.6-.3-5.4-1.3-5.4-5.9 0-1.3.5-2.4 1.2-3.2-.1-.3-.5-1.5.1-3.2 0 0 1-.3 3.3 1.2 1-.3 2-.4 3-.4s2 .1 3 .4c2.3-1.5 3.3-1.2 3.3-1.2.7 1.7.3 2.9.1 3.2.8.8 1.2 1.9 1.2 3.2 0 4.6-2.8 5.6-5.4 5.9.4.4.8 1.1.8 2.2v3.3c0 .3.2.7.8.6 4.6-1.5 7.9-5.8 7.9-10.9C23.5 5.7 18.3.5 12 .5z"/>
            </svg>
          </a>
          <button id="themeToggle" class="icon-btn" type="button"
            aria-label="切换主题" aria-pressed="true">
            <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="hero-bg" aria-hidden="true"></div>
        <div class="container hero-inner">
          <span class="hero-pill">
            <span class="dot" aria-hidden="true"></span>
            <span>在线 · 可直接使用</span>
          </span>
          <h1 id="heroTitle">WebChat Gateway</h1>
          <p class="sub" id="welcomeMessage"></p>
          <div class="hero-cta">
            <a id="primaryCta" class="btn btn-primary" href="/login">
              <span id="primaryCtaText">开始聊天</span>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M5 12h14M13 5l7 7-7 7"/>
              </svg>
            </a>
            <span id="ctaHint" class="hint">需要先输入访问 token</span>
          </div>
        </div>
      </section>

      <section class="usage">
        <div class="container">
          <div class="section-head">
            <span class="eyebrow">怎么用</span>
            <h2>三步上手。</h2>
            <p>把发给你的链接打开就够了，剩下的页面会带你走完。</p>
          </div>
          <div class="features">
            <article class="feature">
              <div class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <rect x="3" y="11" width="18" height="11" rx="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </div>
              <h3>1 · 拿到 token</h3>
              <p>把这个网站发给你的人，会同时把一串访问 token 给你。
                它就是你这边的钥匙，请妥善保存。</p>
            </article>
            <article class="feature">
              <div class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                </svg>
              </div>
              <h3>2 · 开始聊天</h3>
              <p>点上面的按钮进入聊天页，把 token 粘进去，
                像和朋友打字一样直接发送就行。</p>
            </article>
            <article class="feature">
              <div class="feature-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M3 12a9 9 0 1 0 9-9"/>
                  <polyline points="3 4 3 12 11 12"/>
                </svg>
              </div>
              <h3>3 · 随时回来</h3>
              <p>对话上下文会自动接续，下次回到同一台设备，
                上一轮的话题还在原地等你。</p>
            </article>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="container foot-row">
        <span id="footerName">WebChat Gateway</span>
        <span class="spacer"></span>
        <a id="privacyLink" href="#" hidden>隐私声明</a>
        <span>AGPLv3</span>
      </div>
    </footer>

    <script>
      (() => {
        const THEME_KEY = "wcg.landing.theme";
        const LS_TOKEN = "wcg.token";

        const root = document.documentElement;
        const themeBtn = document.getElementById("themeToggle");
        const themeIcon = document.getElementById("themeIcon");
        const sunPath = '<path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/><circle cx="12" cy="12" r="4"/>';
        const moonPath = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';

        function applyTheme(t) {
          root.setAttribute("data-theme", t);
          themeIcon.innerHTML = t === "dark" ? moonPath : sunPath;
          themeBtn.setAttribute("aria-pressed", String(t === "dark"));
        }
        applyTheme(localStorage.getItem(THEME_KEY) || "dark");
        themeBtn.addEventListener("click", () => {
          const next = root.getAttribute("data-theme") === "dark" ? "light" : "dark";
          localStorage.setItem(THEME_KEY, next);
          applyTheme(next);
        });

        // Returning user with a saved token: skip /login, go straight to /chat.
        const cta = document.getElementById("primaryCta");
        const ctaText = document.getElementById("primaryCtaText");
        const ctaHint = document.getElementById("ctaHint");
        const savedToken = (localStorage.getItem(LS_TOKEN) || "").trim();
        if (savedToken) {
          cta.href = "/chat";
          ctaText.textContent = "继续聊天";
          ctaHint.textContent = "用上次保存的 token";
        }

        // Pull operator-set branding. Failure is non-fatal: defaults render.
        async function loadSite() {
          try {
            const resp = await fetch("/api/webchat/site", { credentials: "same-origin" });
            if (!resp.ok) return;
            const data = await resp.json();
            const name = (data.site_name || "").trim() || "WebChat Gateway";
            document.title = name;
            document.getElementById("brandName").textContent = name;
            document.getElementById("heroTitle").textContent = name;
            document.getElementById("footerName").textContent = name;
            const welcome = (data.welcome_message || "").trim();
            document.getElementById("welcomeMessage").textContent = welcome;
            if (data.show_github_link) {
              document.getElementById("githubLink").hidden = false;
            }
            const privacy = (data.privacy_url || "").trim();
            if (privacy) {
              const a = document.getElementById("privacyLink");
              a.href = privacy;
              a.hidden = false;
              if (/^https?:\/\//i.test(privacy)) {
                a.target = "_blank";
                a.rel = "noopener";
              }
            }
          } catch {
            /* offline / network error — keep defaults */
          }
        }
        loadSite();
      })();
    </script>
  </body>
</html>

    <script>
      const LS_API_BASE = "wcg.adm.apiBase";
      const $ = (id) => document.getElementById(id);

      const apiBase = $("apiBase");
      const loginKey = $("loginKey");
      const loginStatus = $("loginStatus");
      const sessionPill = $("sessionPill");

      // apiBase: empty default = same-origin (cookie auth works).
      // Persist if the user explicitly fills it in for cross-origin admin
      // panel hosting (in which case the gateway must allow that origin
      // and the user falls back to bearer entry for every call).
      apiBase.value = localStorage.getItem(LS_API_BASE) || "";
      apiBase.addEventListener("change", () =>
        localStorage.setItem(LS_API_BASE, apiBase.value.trim())
      );

      $("loginReveal").onclick = () => {
        loginKey.type = loginKey.type === "password" ? "text" : "password";
      };

      function showLogin(message = "") {
        $("loginView").classList.remove("hidden");
        $("appView").classList.add("hidden");
        loginStatus.textContent = message || "";
        loginStatus.className = message ? "status error" : "status";
        loginKey.focus();
      }
      function showApp(kind) {
        $("loginView").classList.add("hidden");
        $("appView").classList.remove("hidden");
        sessionPill.textContent = kind === "bearer" ? "bearer" : "session";
        loginKey.value = "";
      }

      function buildUrl(path) {
        const base = apiBase.value.trim();
        return `${base}${path}`;
      }

      async function api(path, opts = {}) {
        const headers = Object.assign(
          { "Content-Type": "application/json" },
          opts.headers || {}
        );
        const resp = await fetch(
          buildUrl(path),
          Object.assign(
            { credentials: "include", headers },
            opts
          )
        );
        let payload;
        try { payload = await resp.json(); } catch { payload = {}; }
        if (!resp.ok) {
          const err = new Error(payload.error || `http_${resp.status}`);
          err.payload = payload;
          err.status = resp.status;
          if (resp.status === 401) {
            // Session expired or never present — bounce to login.
            showLogin("会话已失效，请重新登录。");
          }
          throw err;
        }
        return payload;
      }

      // ----- session bootstrap -----
      async function probeSession() {
        try {
          const me = await fetch(buildUrl("/api/webchat/admin/me"), {
            credentials: "include",
          });
          if (me.ok) {
            const data = await me.json().catch(() => ({}));
            showApp(data.kind || "session");
            return true;
          }
        } catch (e) {
          // Network / CORS; fall through to login.
        }
        showLogin("");
        return false;
      }

      async function doLogin() {
        const key = loginKey.value.trim();
        if (!key) {
          loginStatus.textContent = "请输入 master_admin_key";
          loginStatus.className = "status error";
          return;
        }
        loginStatus.textContent = "登录中...";
        loginStatus.className = "status";
        try {
          const resp = await fetch(buildUrl("/api/webchat/admin/login"), {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key }),
          });
          const data = await resp.json().catch(() => ({}));
          if (!resp.ok) {
            loginStatus.textContent = `登录失败: ${data.error || resp.status}`;
            loginStatus.className = "status error";
            return;
          }
          showApp("session");
        } catch (e) {
          loginStatus.textContent = `登录失败: ${e.message}`;
          loginStatus.className = "status error";
        }
      }

      $("loginSubmit").onclick = doLogin;
      loginKey.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });

      $("logoutBtn").onclick = async () => {
        try {
          await fetch(buildUrl("/api/webchat/admin/logout"), {
            method: "POST",
            credentials: "include",
          });
        } catch (e) {
          // Cookie clear-on-error is the server's job; we still show login.
        }
        showLogin("已登出。");
      };

      // Restart service is wired inside the Settings panel (further
      // down). It used to live in the header but per-field "需重启"
      // chips + a hot button in the header read as more alarming than
      // they should — the single 重启服务 button next to 保存全部修改
      // groups the affordance with the action that actually needs it.

      // tab switching
      const tabs = document.querySelectorAll(".tabs button");
      tabs.forEach((tab) => {
        tab.onclick = () => {
          tabs.forEach((t) => t.classList.toggle("active", t === tab));
          ["issue", "list", "stats", "audit", "settings"].forEach((name) => {
            $(`panel-${name}`).classList.toggle("hidden", name !== tab.dataset.tab);
          });
          if (tab.dataset.tab === "list") loadList();
          if (tab.dataset.tab === "audit") loadAudit();
          if (tab.dataset.tab === "stats") populateNames();
          if (tab.dataset.tab === "settings") loadSettings();
        };
      });

      function fmt(ts) {
        if (!ts) return "-";
        return new Date(ts * 1000).toLocaleString();
      }

      // ----- Issue -----
      $("issue").onclick = async () => {
        const status = $("issueStatus");
        const out = $("tokenOutput");
        status.textContent = "签发中...";
        status.className = "status";
        out.style.display = "none";
        out.textContent = "";
        try {
          const body = {
            name: $("iname").value.trim(),
            note: $("inote").value.trim(),
          };
          const q = $("iquota").value.trim();
          if (q) body.daily_quota = Number(q);
          const result = await api("/api/webchat/admin/tokens", {
            method: "POST",
            body: JSON.stringify(body),
          });
          status.textContent = `已签发 ${result.name}，配额 ${result.daily_quota}`;
          status.className = "status success";
          // F1: build DOM with text nodes — never inject untrusted text via innerHTML
          out.textContent = "";
          const strong = document.createElement("strong");
          strong.textContent = "⚠ 此 Token 仅显示一次，请立即保存：";
          out.appendChild(strong);
          out.appendChild(document.createTextNode(result.token));
          out.style.display = "block";
        } catch (e) {
          status.textContent = `失败: ${e.message} ${e.payload && e.payload.detail || ""}`;
          status.className = "status error";
        }
      };

      // ----- Pagination helper -----
      // Renders a pager into `container` showing: first page + ellipsis +
      // last 3 pages (and current page in the middle when it isn't already
      // covered). Always renders Prev / Next. `onJump(page)` is called when
      // a number is clicked or Prev/Next pressed; the callback owns the
      // actual data refetch.
      function renderPager(container, current, totalPages, onJump) {
        container.textContent = "";
        if (totalPages <= 0) return;
        const cur = Math.max(1, Math.min(current, totalPages));

        const makeBtn = (label, page, opts = {}) => {
          const b = document.createElement("button");
          b.type = "button";
          b.className = "page-btn";
          b.textContent = label;
          if (opts.active) b.classList.add("active");
          if (opts.disabled) b.disabled = true;
          if (opts.aria) b.setAttribute("aria-label", opts.aria);
          if (!opts.disabled && !opts.active) {
            b.onclick = () => onJump(page);
          }
          return b;
        };
        const makeEllipsis = () => {
          const s = document.createElement("span");
          s.className = "ellipsis";
          s.textContent = "…";
          s.setAttribute("aria-hidden", "true");
          return s;
        };

        // Prev
        container.appendChild(
          makeBtn("‹", cur - 1, { disabled: cur <= 1, aria: "上一页" })
        );

        // Build the visible page set: first + last 3 + current (and its
        // immediate neighbors if they sit in the gap, for orientation).
        const pages = new Set();
        pages.add(1);
        for (let i = Math.max(1, totalPages - 2); i <= totalPages; i++) pages.add(i);
        pages.add(cur);
        if (cur - 1 > 1) pages.add(cur - 1);
        if (cur + 1 < totalPages) pages.add(cur + 1);

        const sorted = [...pages].filter((p) => p >= 1 && p <= totalPages).sort((a, b) => a - b);
        let prev = 0;
        for (const p of sorted) {
          if (p - prev > 1) container.appendChild(makeEllipsis());
          container.appendChild(
            makeBtn(String(p), p, { active: p === cur, aria: `第 ${p} 页` })
          );
          prev = p;
        }

        // Next
        container.appendChild(
          makeBtn("›", cur + 1, { disabled: cur >= totalPages, aria: "下一页" })
        );
      }

      // ----- List -----
      let lastList = [];
      let listPageState = { page: 1, pageSize: 50 };
      async function loadList(resetPage = true) {
        const status = $("listStatus");
        status.textContent = "加载中...";
        status.className = "status";
        try {
          const q = $("includeRevoked").checked ? "?include_revoked=true" : "";
          const data = await api(`/api/webchat/admin/tokens${q}`);
          lastList = data.tokens;
          if (resetPage) listPageState.page = 1;
          renderListPage();
          status.textContent = `${data.tokens.length} 个 token`;
          status.className = "status success";
        } catch (e) {
          status.textContent = `失败: ${e.message}`;
          status.className = "status error";
        }
      }
      function renderListPage() {
        const { page, pageSize } = listPageState;
        const total = lastList.length;
        const totalPages = Math.max(1, Math.ceil(total / pageSize));
        const curPage = Math.min(page, totalPages);
        listPageState.page = curPage;
        const start = (curPage - 1) * pageSize;
        const slice = lastList.slice(start, start + pageSize);
        renderList(slice);
        const pagination = $("listPagination");
        if (total === 0) {
          pagination.hidden = true;
        } else {
          pagination.hidden = false;
          const fromIdx = start + 1;
          const toIdx = Math.min(start + slice.length, total);
          $("listSummary").innerHTML =
            `第 <strong>${fromIdx}-${toIdx}</strong> 条 / 共 <strong>${total}</strong> 条 · 第 <strong>${curPage}</strong> / ${totalPages} 页`;
          renderPager($("listPager"), curPage, totalPages, (p) => {
            listPageState.page = p;
            renderListPage();
          });
        }
      }
      function renderList(rows) {
        const body = $("listBody");
        body.innerHTML = "";
        const now = Date.now();
        for (const t of rows) {
          const tr = document.createElement("tr");
          const expiredNow =
            t.expires_at != null && t.expires_at * 1000 <= now;
          let badgeClass, badgeText;
          if (t.revoked_at) {
            badgeClass = "revoked";
            badgeText = "已撤销";
          } else if (expiredNow) {
            badgeClass = "expired";
            badgeText = "已过期";
          } else {
            badgeClass = "active";
            badgeText = "active";
          }
          tr.innerHTML = `
            <td>${escape(t.name)}</td>
            <td><span class="badge ${badgeClass}">${escape(badgeText)}</span></td>
            <td>${t.today_usage} / ${t.daily_quota}</td>
            <td>${fmt(t.created_at)}</td>
            <td>${fmt(t.expires_at)}</td>
            <td>${escape(t.note || "")}</td>
            <td></td>
          `;
          const editBtn = document.createElement("button");
          editBtn.type = "button";
          editBtn.className = "ghost small";
          editBtn.textContent = "编辑";
          editBtn.onclick = () => openEditor(t);
          tr.lastElementChild.appendChild(editBtn);
          body.appendChild(tr);
        }
      }
      $("refreshList").onclick = () => loadList(true);
      $("includeRevoked").onchange = () => loadList(true);
      $("listPageSize").onchange = (e) => {
        listPageState.pageSize = Number(e.target.value) || 50;
        listPageState.page = 1;
        renderListPage();
      };

      // ----- Stats -----
      function populateNames() {
        const dl = $("nameList");
        dl.innerHTML = "";
        for (const t of lastList) {
          const opt = document.createElement("option");
          opt.value = t.name;
          dl.appendChild(opt);
        }
      }
      $("loadStats").onclick = async () => {
        const status = $("statsStatus");
        status.textContent = "加载中...";
        status.className = "status";
        try {
          const name = encodeURIComponent($("sname").value.trim());
          const days = Number($("sdays").value) || 7;
          const data = await api(`/api/webchat/admin/stats?name=${name}&days=${days}`);
          renderStats(data);
          status.textContent = `配额 ${data.daily_quota}${data.revoked ? " (已撤销)" : ""}`;
          status.className = "status success";
        } catch (e) {
          status.textContent = `失败: ${e.message}`;
          status.className = "status error";
        }
      };
      function renderStats(data) {
        const tbody = $("statsBody");
        tbody.innerHTML = "";
        for (const item of data.history) {
          const tr = document.createElement("tr");
          // Server currently sends `day` as a YYYY-MM-DD string and
          // `count` as a number, so the values look benign — but other
          // dynamic innerHTML in this file routes through escape()
          // (the token/audit tables). Keeping ONE template literal
          // raw is exactly the shape a future XSS regression would
          // exploit; route through escape() uniformly so this row
          // never becomes an exception worth auditing again.
          tr.innerHTML = `<td>${escape(item.day)}</td><td>${escape(String(item.count))}</td>`;
          tbody.appendChild(tr);
        }
        drawChart(data.history, data.daily_quota);
      }
      function drawChart(history, quota) {
        const canvas = $("statsChart");
        const ctx = canvas.getContext("2d");
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);
        if (history.length === 0) return;
        const max = Math.max(quota, ...history.map((h) => h.count), 1);
        const padL = 40, padB = 22, padT = 12;
        const usable = H - padT - padB;
        const barW = (W - padL) / history.length;
        // grid + quota line
        ctx.strokeStyle = "#30363d";
        ctx.fillStyle = "#8b949e";
        ctx.font = "11px ui-monospace, SFMono-Regular, Menlo, monospace";
        const yQuota = padT + usable - (quota / max) * usable;
        ctx.beginPath();
        ctx.setLineDash([4, 4]);
        ctx.moveTo(padL, yQuota);
        ctx.lineTo(W, yQuota);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillText(`quota=${quota}`, 4, yQuota + 4);
        // bars
        history.forEach((item, i) => {
          const h = (item.count / max) * usable;
          const x = padL + i * barW + 3;
          const y = padT + usable - h;
          ctx.fillStyle = item.count >= quota ? "#f85149" : "#a371f7";
          ctx.fillRect(x, y, barW - 6, h);
          ctx.fillStyle = "#8b949e";
          if (i % Math.ceil(history.length / 7) === 0) {
            ctx.fillText(item.day.slice(5), x, H - 6);
          }
        });
      }

      // ----- Audit -----
      let auditTimer = null;
      let auditPageState = { page: 1, pageSize: 100 };

      function readAuditFilters() {
        const f = {
          event: $("filterEvent").value.trim(),
          name: $("filterName").value.trim(),
          ip: $("filterIp").value.trim(),
        };
        const fromVal = $("filterFrom").value.trim();
        const toVal = $("filterTo").value.trim();
        if (fromVal) {
          const ms = new Date(fromVal).getTime();
          if (!Number.isNaN(ms)) f.ts_from = Math.round(ms / 1000);
        }
        if (toVal) {
          const ms = new Date(toVal).getTime();
          if (!Number.isNaN(ms)) f.ts_to = Math.round(ms / 1000);
        }
        return f;
      }

      async function loadAudit(resetPage = true) {
        const status = $("auditStatus");
        status.textContent = "加载中...";
        status.className = "status";
        try {
          if (resetPage) auditPageState.page = 1;
          const filters = readAuditFilters();
          const params = new URLSearchParams();
          params.set("page", String(auditPageState.page));
          params.set("page_size", String(auditPageState.pageSize));
          if (filters.event) params.set("event", filters.event);
          if (filters.name) params.set("name", filters.name);
          if (filters.ip) params.set("ip", filters.ip);
          if (filters.ts_from != null) params.set("ts_from", String(filters.ts_from));
          if (filters.ts_to != null) params.set("ts_to", String(filters.ts_to));
          const data = await api(`/api/webchat/admin/audit?${params.toString()}`);
          renderAudit(data.events);
          renderAuditPagination(data);
          status.textContent = data.total != null
            ? `共 ${data.total} 条，本页 ${data.events.length} 条`
            : `${data.events.length} 条`;
          status.className = "status success";
        } catch (e) {
          status.textContent = `失败: ${e.message}`;
          status.className = "status error";
        }
      }
      function renderAuditPagination(data) {
        const total = Number(data.total || 0);
        const pageSize = Number(data.page_size || auditPageState.pageSize);
        const page = Number(data.page || auditPageState.page);
        auditPageState.page = page;
        auditPageState.pageSize = pageSize;
        const pagination = $("auditPagination");
        if (total === 0) {
          pagination.hidden = true;
          return;
        }
        pagination.hidden = false;
        const totalPages = Math.max(1, Math.ceil(total / pageSize));
        const start = (page - 1) * pageSize + 1;
        const end = Math.min(page * pageSize, total);
        $("auditSummary").innerHTML =
          `第 <strong>${start}-${end}</strong> 条 / 共 <strong>${total}</strong> 条 · 第 <strong>${page}</strong> / ${totalPages} 页`;
        renderPager($("auditPager"), page, totalPages, (p) => {
          auditPageState.page = p;
          loadAudit(false);
        });
      }
      function renderAudit(events) {
        const body = $("auditBody");
        body.innerHTML = "";
        for (const ev of events) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${fmt(ev.ts)}</td>
            <td>${escape(ev.event)}</td>
            <td>${escape(ev.name || "-")}</td>
            <td>${escape(ev.ip || "-")}</td>
            <td><pre class="detail">${escape(ev.detail || "")}</pre></td>
          `;
          body.appendChild(tr);
        }
      }
      $("refreshAudit").onclick = () => loadAudit(false);
      $("autoRefresh").onchange = (e) => {
        clearInterval(auditTimer);
        if (e.target.checked) {
          // Auto-refresh keeps the current page so the operator's view
          // doesn't yank back to page 1 every 10s. New rows arriving while
          // they're paging through page 5 will surface on the next manual
          // refresh — that's the right trade-off.
          auditTimer = setInterval(() => loadAudit(false), 10000);
        }
      };
      $("auditPageSize").onchange = (e) => {
        auditPageState.pageSize = Number(e.target.value) || 100;
        loadAudit(true);
      };
      $("applyFilter").onclick = () => loadAudit(true);
      $("clearFilter").onclick = () => {
        $("filterEvent").value = "";
        $("filterName").value = "";
        $("filterIp").value = "";
        $("filterFrom").value = "";
        $("filterTo").value = "";
        loadAudit(true);
      };
      // Enter inside any filter field triggers the same search.
      ["filterEvent", "filterName", "filterIp", "filterFrom", "filterTo"].forEach((id) => {
        $(id).addEventListener("keydown", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            loadAudit(true);
          }
        });
      });

      function escape(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      // ----- Settings -----
      // Spec: GET /api/webchat/admin/settings -> {fields: [{key, section, type,
      // value, hint?, min?, max?, options?, restart_required}]}.
      // PATCH /api/webchat/admin/settings with {updates: {key: value}}.
      // Sections render in the order they appear in the response; we trust
      // the server to emit Branding -> Behaviour -> Security -> Streaming
      // -> Uploads as the spec pins it. Section names are now Chinese
      // (e.g. "站点信息") since the schema labels everything in Chinese.
      const SECTION_ORDER = [
        "站点信息",
        "对话行为",
        "安全",
        "流式缓冲",
        "图片上传",
      ];
      const settingsState = {
        // key -> { field (server descriptor), control (input element),
        //          read () => raw value, dirty: bool, section: string }
        fields: new Map(),
      };

      function settingsRawValue(entry) {
        const { field, control } = entry;
        if (field.type === "bool") return control.checked;
        if (field.type === "int") {
          // Allow blank during typing; submit-time coercion turns blank into 0,
          // but server's int validator will reject if min > 0, which is the
          // right outcome (operator sees "out_of_range" and corrects).
          const raw = control.value.trim();
          if (raw === "") return "";
          const n = Number(raw);
          return Number.isFinite(n) ? n : raw;
        }
        return control.value;
      }

      function settingsCoerce(field, raw) {
        if (field.type === "bool") return Boolean(raw);
        if (field.type === "int") {
          const n = Number(raw);
          if (!Number.isFinite(n)) return raw;
          return n;
        }
        return String(raw);
      }

      function settingsDirtyCount() {
        let n = 0;
        for (const e of settingsState.fields.values()) if (e.dirty) n++;
        return n;
      }

      function settingsRefreshSaveButton() {
        const btn = document.getElementById("saveAllSettings");
        if (!btn) return;
        const n = settingsDirtyCount();
        // Use textContent so we don't have to escape anything, and a
        // count chip span when there's at least one dirty field.
        btn.textContent = "";
        btn.appendChild(document.createTextNode("保存全部修改"));
        if (n > 0) {
          const count = document.createElement("span");
          count.className = "count";
          count.textContent = `(${n})`;
          btn.appendChild(count);
        }
        btn.disabled = n === 0;
      }

      function settingsMarkDirty(entry) {
        if (entry.dirty) return;
        entry.dirty = true;
        entry.row.classList.add("dirty");
        settingsRefreshSaveButton();
      }

      function settingsClearDirty(entry) {
        if (!entry.dirty) return;
        entry.dirty = false;
        entry.row.classList.remove("dirty");
        settingsRefreshSaveButton();
      }

      function buildSettingsField(field) {
        const row = document.createElement("div");
        row.className = "settings-field";
        if (field.type === "csv") row.classList.add("full");

        const label = document.createElement("label");
        label.className = "field-label";
        const labelText = document.createElement("span");
        labelText.className = "key";
        labelText.textContent = field.label || field.key;
        label.appendChild(labelText);
        // Per-field 需重启 badges removed: nearly every whitelisted field
        // requires a restart, so a per-row chip was visual noise.
        // The 状态栏 status line + the 重启服务 button cover the
        // affordance once at the top instead of per-row. `field.label`
        // (Chinese) is what operators read now; `field.key` (dotted
        // path) is still attached as a `title` so an operator can hover
        // to confirm the underlying config key.
        if (field.label && field.label !== field.key) {
          label.title = field.key;
        }
        row.appendChild(label);

        let control;
        if (field.type === "bool") {
          const wrap = document.createElement("div");
          wrap.className = "bool-row";
          control = document.createElement("input");
          control.type = "checkbox";
          control.checked = Boolean(field.value);
          const ctrlId = `set-${field.key.replace(/\./g, "_")}`;
          control.id = ctrlId;
          label.setAttribute("for", ctrlId);
          const onLabel = document.createElement("span");
          onLabel.textContent = field.value ? "启用" : "禁用";
          control.addEventListener("change", () => {
            onLabel.textContent = control.checked ? "启用" : "禁用";
          });
          wrap.appendChild(control);
          wrap.appendChild(onLabel);
          row.appendChild(wrap);
        } else if (field.type === "options") {
          control = document.createElement("select");
          const ctrlId = `set-${field.key.replace(/\./g, "_")}`;
          control.id = ctrlId;
          label.setAttribute("for", ctrlId);
          for (const opt of field.options || []) {
            const o = document.createElement("option");
            o.value = String(opt);
            o.textContent = String(opt);
            if (String(opt) === String(field.value)) o.selected = true;
            control.appendChild(o);
          }
          row.appendChild(control);
        } else if (field.type === "csv") {
          control = document.createElement("textarea");
          control.rows = 2;
          control.placeholder = "用逗号分隔";
          control.value = field.value == null ? "" : String(field.value);
          const ctrlId = `set-${field.key.replace(/\./g, "_")}`;
          control.id = ctrlId;
          label.setAttribute("for", ctrlId);
          row.appendChild(control);
        } else if (field.type === "int") {
          control = document.createElement("input");
          control.type = "number";
          control.step = "1";
          if (field.min != null) control.min = String(field.min);
          if (field.max != null) control.max = String(field.max);
          control.value = field.value == null ? "" : String(field.value);
          const ctrlId = `set-${field.key.replace(/\./g, "_")}`;
          control.id = ctrlId;
          label.setAttribute("for", ctrlId);
          row.appendChild(control);
        } else if (field.secret) {
          // Secret string: password-typed input + 显示/隐藏 toggle so
          // the operator can verify they pasted the right thing without
          // leaving the value rendered as plain text in the DOM. The
          // value is still in the GET payload (admin is already
          // authenticated), but the UI doesn't broadcast it on screen.
          const wrap = document.createElement("div");
          wrap.className = "secret-row";
          control = document.createElement("input");
          control.type = "password";
          control.autocomplete = "new-password";
          control.spellcheck = false;
          control.value = field.value == null ? "" : String(field.value);
          const ctrlId = `set-${field.key.replace(/\./g, "_")}`;
          control.id = ctrlId;
          label.setAttribute("for", ctrlId);
          const toggle = document.createElement("button");
          toggle.type = "button";
          toggle.className = "secret-toggle";
          toggle.textContent = "显示";
          toggle.setAttribute("aria-pressed", "false");
          toggle.onclick = () => {
            const showing = control.type === "text";
            control.type = showing ? "password" : "text";
            toggle.textContent = showing ? "显示" : "隐藏";
            toggle.setAttribute("aria-pressed", String(!showing));
          };
          wrap.appendChild(control);
          wrap.appendChild(toggle);
          row.appendChild(wrap);
        } else {
          // string fallback
          control = document.createElement("input");
          control.type = "text";
          control.value = field.value == null ? "" : String(field.value);
          const ctrlId = `set-${field.key.replace(/\./g, "_")}`;
          control.id = ctrlId;
          label.setAttribute("for", ctrlId);
          row.appendChild(control);
        }

        if (field.hint) {
          const hint = document.createElement("span");
          hint.className = "hint";
          hint.textContent = field.hint;
          row.appendChild(hint);
        }

        const entry = {
          field,
          control,
          row,
          section: field.section,
          dirty: false,
        };
        entry.read = () => settingsRawValue(entry);

        const evt = field.type === "bool" || field.type === "options" ? "change" : "input";
        control.addEventListener(evt, () => settingsMarkDirty(entry));

        settingsState.fields.set(field.key, entry);
        return row;
      }

      async function loadSettings() {
        const status = $("settingsStatus");
        const container = $("settingsContainer");
        status.textContent = "加载中...";
        status.className = "status";
        container.innerHTML = "";
        settingsState.fields.clear();
        settingsRefreshSaveButton();
        try {
          const data = await api("/api/webchat/admin/settings");
          const fields = Array.isArray(data.fields) ? data.fields : [];
          const bySection = new Map();
          for (const f of fields) {
            if (!bySection.has(f.section)) bySection.set(f.section, []);
            bySection.get(f.section).push(f);
          }
          // Render in pinned order first, then any unexpected section the
          // server emits (defensive — schema fixes the five canonical
          // groups but a future addition shouldn't drop off the page).
          const sectionsSeen = new Set();
          const sectionOrder = [];
          for (const s of SECTION_ORDER) {
            if (bySection.has(s)) {
              sectionOrder.push(s);
              sectionsSeen.add(s);
            }
          }
          for (const s of bySection.keys()) {
            if (!sectionsSeen.has(s)) sectionOrder.push(s);
          }
          for (const sectionName of sectionOrder) {
            const group = document.createElement("section");
            group.className = "settings-group";
            group.dataset.section = sectionName;

            const heading = document.createElement("h3");
            heading.textContent = sectionName;
            group.appendChild(heading);

            const grid = document.createElement("div");
            grid.className = "settings-fields";
            for (const field of bySection.get(sectionName)) {
              grid.appendChild(buildSettingsField(field));
            }
            group.appendChild(grid);
            // Per-section save buttons removed: one global 保存全部修改
            // in the panel header handles batching. Operators get a
            // single submit point + a single batch validation result.
            container.appendChild(group);
          }
          status.textContent = `共 ${fields.length} 项配置`;
          status.className = "status success";
        } catch (e) {
          status.textContent = `加载失败: ${e.message}`;
          status.className = "status error";
        }
      }

      async function saveAllSettings() {
        const status = $("settingsStatus");
        const btn = $("saveAllSettings");
        const updates = {};
        const dirtyEntries = [];
        for (const entry of settingsState.fields.values()) {
          if (!entry.dirty) continue;
          updates[entry.field.key] = settingsCoerce(entry.field, entry.read());
          dirtyEntries.push(entry);
        }
        if (dirtyEntries.length === 0) {
          status.textContent = "无改动";
          status.className = "status";
          return;
        }
        btn.disabled = true;
        status.textContent = "保存中...";
        status.className = "status";
        try {
          const result = await api("/api/webchat/admin/settings", {
            method: "PATCH",
            body: JSON.stringify({ updates }),
          });
          const saved = Array.isArray(result.saved) ? result.saved : [];
          const restartList = Array.isArray(result.restart_required) ? result.restart_required : [];
          const savedSet = new Set(saved);
          for (const entry of dirtyEntries) {
            if (savedSet.has(entry.field.key)) settingsClearDirty(entry);
          }
          const restartCount = restartList.length;
          if (restartCount > 0) {
            status.textContent = `已保存 ${saved.length} 项 · 点击「重启服务」使配置生效`;
          } else {
            status.textContent = `已保存 ${saved.length} 项（已生效）`;
          }
          status.className = "status success";
        } catch (e) {
          const code = (e.payload && e.payload.error) || e.message;
          const detail = e.payload && e.payload.detail ? ` (${e.payload.detail})` : "";
          status.textContent = `失败: ${code}${detail}`;
          status.className = "status error";
        } finally {
          // saveAllSettings's enabled state is driven by settingsDirtyCount
          // via settingsRefreshSaveButton — call it AFTER finally so
          // the post-save state (some entries cleaned, some still
          // dirty if the server rejected them) is reflected.
          settingsRefreshSaveButton();
        }
      }

      $("refreshSettings").onclick = () => loadSettings();
      $("saveAllSettings").onclick = saveAllSettings;

      // ----- Restart service (inside Settings panel) -----
      // POST /admin/restart triggers a full _stop + _start cycle on the
      // server. The handler 202's before the lifecycle bounce so this
      // fetch always succeeds; the server drops the socket a moment
      // later, so subsequent requests fail for ~1-3s while routes
      // re-register. Poll /admin/me once a second up to 30 attempts to
      // detect recovery, then surface the result inline in the
      // settings status line instead of a modal alert (the operator is
      // already focused on this panel).
      $("restartFromSettingsBtn").onclick = async () => {
        const btn = $("restartFromSettingsBtn");
        const status = $("settingsStatus");
        if (btn.disabled) return;
        const okGo = confirm(
          "重启 WebChat 服务？\n" +
          "\n" +
          "• 所有正在进行的对话流会被中断（聊天页会自动重连）。\n" +
          "• 几乎所有设置项只有重启后才会生效，这是常规操作。\n" +
          "• 若重启失败，请到 AstrBot 后台手动重载本插件。"
        );
        if (!okGo) return;
        btn.disabled = true;
        const originalText = btn.textContent;
        btn.textContent = "重启中…";
        status.textContent = "正在重启服务…";
        status.className = "status";
        try {
          const resp = await fetch(buildUrl("/api/webchat/admin/restart"), {
            method: "POST",
            credentials: "include",
          });
          if (!resp.ok && resp.status !== 202) {
            const data = await resp.json().catch(() => ({}));
            status.textContent = `重启请求失败: ${data.error || resp.status}`;
            status.className = "status error";
            btn.textContent = originalText;
            btn.disabled = false;
            return;
          }
          for (let i = 0; i < 30; i++) {
            await new Promise((r) => setTimeout(r, 1000));
            try {
              const me = await fetch(buildUrl("/api/webchat/admin/me"), {
                credentials: "include",
              });
              if (me.ok) {
                btn.textContent = originalText;
                btn.disabled = false;
                status.textContent = "WebChat 服务已重启完成";
                status.className = "status success";
                return;
              }
            } catch (e) { /* socket refused / DNS hiccup — keep polling */ }
          }
          btn.textContent = originalText;
          btn.disabled = false;
          status.textContent = "等待服务恢复超时，请到 AstrBot 后台手动重载插件";
          status.className = "status error";
        } catch (e) {
          btn.textContent = originalText;
          btn.disabled = false;
          status.textContent = `重启失败: ${e.message}`;
          status.className = "status error";
        }
      };

      // ----- Editor modal -----
      const editorModal = $("editorModal");
      const editorForm = $("editorForm");
      const editorStatus = $("editorStatus");
      const edName = $("ed-name");
      const edQuota = $("ed-quota");
      const edToday = $("ed-today");
      const edExpires = $("ed-expires");
      const edExpiresClear = $("ed-expires-clear");
      const edNote = $("ed-note");
      const edNoteCount = $("ed-note-count");
      const edStatusBadge = $("ed-status-badge");
      const edRevokeToggle = $("ed-revoke-toggle");
      const edRegenRandom = $("ed-regen-random");
      const edCustomToken = $("ed-custom-token");
      const edTokenReveal = $("ed-token-reveal");

      let edOriginal = null;       // snapshot of fields at open
      let edCurrentName = null;    // tracks rename across saves
      let edRevokedAt = null;      // current revoked_at (number | null)
      let edPendingRegen = false;  // random-regen flag set by button
      let edPrevFocus = null;      // element to restore focus on close
      let edKeyHandler = null;

      function tsToLocalInput(ts) {
        // Unix-seconds → "YYYY-MM-DDTHH:MM" in local TZ for datetime-local.
        if (!ts) return "";
        const d = new Date(ts * 1000);
        const off = d.getTimezoneOffset() * 60000;
        return new Date(d.getTime() - off).toISOString().slice(0, 16);
      }
      function localInputToTs(value) {
        const v = value && value.trim();
        if (!v) return null;
        const ms = new Date(v).getTime();
        if (Number.isNaN(ms)) return null;
        return Math.round(ms / 1000);
      }

      function setEditorStatus(text, kind) {
        editorStatus.textContent = text || "";
        editorStatus.className = kind ? `status ${kind}` : "status";
      }

      function refreshStatusBadge() {
        const now = Math.floor(Date.now() / 1000);
        const expiresAt = localInputToTs(edExpires.value);
        edStatusBadge.classList.remove("active", "revoked", "expired");
        if (edRevokedAt) {
          edStatusBadge.classList.add("revoked");
          edStatusBadge.textContent = "已撤销";
          edRevokeToggle.textContent = "重新启用";
        } else if (expiresAt != null && expiresAt <= now) {
          edStatusBadge.classList.add("expired");
          edStatusBadge.textContent = "已过期";
          edRevokeToggle.textContent = "撤销";
        } else {
          edStatusBadge.classList.add("active");
          edStatusBadge.textContent = "active";
          edRevokeToggle.textContent = "撤销";
        }
      }

      function clearTokenReveal() {
        edTokenReveal.hidden = true;
        edTokenReveal.className = "";
        while (edTokenReveal.firstChild) {
          edTokenReveal.removeChild(edTokenReveal.firstChild);
        }
      }
      function showTokenReveal(plaintext) {
        clearTokenReveal();
        edTokenReveal.className = "token-output";
        const strong = document.createElement("strong");
        strong.textContent = "⚠ 此 Token 仅显示一次，请立即保存：";
        edTokenReveal.appendChild(strong);
        edTokenReveal.appendChild(document.createTextNode(plaintext));
        edTokenReveal.hidden = false;
      }

      function focusableInModal() {
        return Array.from(
          editorModal.querySelectorAll(
            'a[href], button:not([disabled]), input:not([disabled]), textarea:not([disabled]), select:not([disabled]), [tabindex]:not([tabindex="-1"])'
          )
        ).filter((el) => !el.hidden && el.offsetParent !== null);
      }

      function openEditor(token) {
        edOriginal = {
          name: token.name,
          daily_quota: token.daily_quota,
          note: token.note || "",
          expires_at: token.expires_at == null ? null : token.expires_at,
        };
        edCurrentName = token.name;
        edRevokedAt = token.revoked_at || null;
        edPendingRegen = false;
        clearTokenReveal();
        setEditorStatus("");

        edName.value = token.name;
        edQuota.value = String(token.daily_quota);
        edToday.textContent = `今日 ${token.today_usage ?? 0}`;
        edExpires.value = tsToLocalInput(token.expires_at);
        edNote.value = token.note || "";
        edNoteCount.textContent = `${edNote.value.length} / 255`;
        edCustomToken.value = "";
        refreshStatusBadge();

        edPrevFocus = document.activeElement;
        editorModal.hidden = false;
        document.body.style.overflow = "hidden";

        edKeyHandler = (e) => {
          if (e.key === "Escape") {
            e.preventDefault();
            closeEditor();
          } else if (e.key === "Tab") {
            const focusables = focusableInModal();
            if (focusables.length === 0) return;
            const first = focusables[0];
            const last = focusables[focusables.length - 1];
            if (e.shiftKey && document.activeElement === first) {
              e.preventDefault();
              last.focus();
            } else if (!e.shiftKey && document.activeElement === last) {
              e.preventDefault();
              first.focus();
            }
          }
        };
        document.addEventListener("keydown", edKeyHandler, true);

        // Focus the first focusable field.
        setTimeout(() => {
          const focusables = focusableInModal();
          if (focusables.length) focusables[0].focus();
        }, 0);
      }

      function closeEditor() {
        if (editorModal.hidden) return;
        editorModal.hidden = true;
        document.body.style.overflow = "";
        if (edKeyHandler) {
          document.removeEventListener("keydown", edKeyHandler, true);
          edKeyHandler = null;
        }
        clearTokenReveal();      // drop plaintext from DOM
        edCustomToken.value = "";
        setEditorStatus("");
        if (edPrevFocus && typeof edPrevFocus.focus === "function") {
          try { edPrevFocus.focus(); } catch {}
        }
        edOriginal = null;
        edCurrentName = null;
        edPendingRegen = false;
      }

      // Backdrop / × / 取消 close handlers (any element with [data-close]).
      editorModal.addEventListener("click", (e) => {
        const target = e.target.closest("[data-close]");
        if (target && editorModal.contains(target)) {
          e.preventDefault();
          closeEditor();
        }
      });

      edNote.addEventListener("input", () => {
        edNoteCount.textContent = `${edNote.value.length} / 255`;
      });
      edExpires.addEventListener("input", refreshStatusBadge);
      edExpiresClear.onclick = () => {
        edExpires.value = "";
        refreshStatusBadge();
      };

      edRevokeToggle.onclick = async () => {
        if (!edCurrentName) return;
        const willRevoke = !edRevokedAt;
        if (willRevoke && !confirm(`确定撤销 ${edCurrentName}?`)) return;
        edRevokeToggle.disabled = true;
        setEditorStatus(willRevoke ? "撤销中..." : "重新启用中...");
        try {
          const result = await api(
            `/api/webchat/admin/tokens/${encodeURIComponent(edCurrentName)}`,
            {
              method: "PATCH",
              body: JSON.stringify({ revoked: willRevoke }),
            }
          );
          edRevokedAt = result.revoked_at || null;
          refreshStatusBadge();
          setEditorStatus(willRevoke ? "已撤销" : "已重新启用", "success");
          loadList();
        } catch (e) {
          setEditorStatus(`失败: ${e.message}`, "error");
        } finally {
          edRevokeToggle.disabled = false;
        }
      };

      edRegenRandom.onclick = async () => {
        if (!edCurrentName) return;
        if (!confirm("旧 token 立刻失效，确认重新生成?")) return;
        edRegenRandom.disabled = true;
        setEditorStatus("生成中...");
        try {
          const result = await api(
            `/api/webchat/admin/tokens/${encodeURIComponent(edCurrentName)}/regenerate`,
            {
              method: "POST",
              body: JSON.stringify({}),
            }
          );
          showTokenReveal(result.token);
          setEditorStatus("已生成新 token，请立即保存", "success");
          loadList();
        } catch (e) {
          setEditorStatus(`失败: ${e.message}`, "error");
        } finally {
          edRegenRandom.disabled = false;
        }
      };

      editorForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        if (!edOriginal || !edCurrentName) return;

        const newName = edName.value.trim();
        if (!newName) {
          setEditorStatus("Name 不能为空", "error");
          return;
        }
        const quotaRaw = edQuota.value.trim();
        const quotaNum = Number(quotaRaw);
        if (!quotaRaw || !Number.isFinite(quotaNum) || quotaNum < 1 || quotaNum > 1000000) {
          setEditorStatus("配额必须在 1 ~ 1,000,000 之间", "error");
          return;
        }
        const noteVal = edNote.value;
        const expiresTs = localInputToTs(edExpires.value);
        const customToken = edCustomToken.value.trim();
        if (customToken && customToken.length > 256) {
          setEditorStatus("自定义 token 长度不能超过 256", "error");
          return;
        }

        const patchBody = {};
        if (newName !== edOriginal.name) patchBody.new_name = newName;
        if (quotaNum !== edOriginal.daily_quota) patchBody.daily_quota = quotaNum;
        if (noteVal !== edOriginal.note) patchBody.note = noteVal;
        if (expiresTs !== edOriginal.expires_at) patchBody.expires_at = expiresTs;

        const submitBtn = editorForm.querySelector('button[type="submit"]');
        if (submitBtn) submitBtn.disabled = true;
        setEditorStatus("保存中...");

        try {
          if (Object.keys(patchBody).length > 0) {
            const result = await api(
              `/api/webchat/admin/tokens/${encodeURIComponent(edCurrentName)}`,
              {
                method: "PATCH",
                body: JSON.stringify(patchBody),
              }
            );
            edCurrentName = result.name;
            edOriginal = {
              name: result.name,
              daily_quota: result.daily_quota,
              note: result.note || "",
              expires_at: result.expires_at == null ? null : result.expires_at,
            };
            edRevokedAt = result.revoked_at || null;
          }

          const willRegen = customToken.length > 0 || edPendingRegen;
          if (willRegen) {
            const regenBody = customToken ? { custom_token: customToken } : {};
            const result = await api(
              `/api/webchat/admin/tokens/${encodeURIComponent(edCurrentName)}/regenerate`,
              {
                method: "POST",
                body: JSON.stringify(regenBody),
              }
            );
            showTokenReveal(result.token);
            edCustomToken.value = "";
            edPendingRegen = false;
            setEditorStatus("已保存并更换 token，请立即记录", "success");
            loadList();
            // Stay open so the user can copy the plaintext.
          } else {
            setEditorStatus("");
            loadList();
            closeEditor();
          }
        } catch (err) {
          setEditorStatus(`失败: ${err.message}`, "error");
        } finally {
          if (submitBtn) submitBtn.disabled = false;
        }
      });

      // Boot: see if a prior session is still good before showing login.
      probeSession();
    </script>
  </body>
</html>

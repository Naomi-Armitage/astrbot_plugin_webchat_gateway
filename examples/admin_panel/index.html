<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Defence-in-depth CSP. JS + CSS are inlined into this file, so
      'unsafe-inline' is required to keep the bundle loadable; the
      rest is tightened. connect-src includes https: so an operator
      can set apiBase to a cross-origin admin host (the field exists
      precisely for that deployment shape).
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; connect-src 'self' https:; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none';" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>WebChat Gateway · Admin Panel</title>
    <style>
      :root {
        --bg: #0d1117;
        --bg-elev: #0b0f15;
        --surface: #161b22;
        --surface-2: #1c2330;
        --border: #30363d;
        --border-soft: #21262d;
        --text: #e6edf3;
        --text-strong: #f0f6fc;
        --muted: #8b949e;
        --accent: #a371f7;
        --accent-strong: #b692ff;
        --accent-soft: rgba(163, 113, 247, 0.14);
        --good: #3fb950;
        --warn: #d29922;
        --bad: #f85149;
        /* Handwriting for Latin; system Chinese sans for CJK. Comic
           Sans / Comic Neue / Chalkboard SE / Marker Felt have no CJK
           glyphs, so the browser does per-character font substitution
           and pulls Chinese from the next CJK-capable entry —
           PingFang SC (mac), Microsoft YaHei (Windows), the rest
           covers Linux + Android. NO 楷体 / Kaiti — looks bad at UI
           sizes; user explicitly rejected. */
        --font-handwriting:
          "Comic Sans MS", "Comic Neue", "Chalkboard SE", "Marker Felt",
          "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei",
          "Noto Sans CJK SC", "Source Han Sans SC",
          system-ui, -apple-system, Roboto, sans-serif;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.55 var(--font-handwriting);
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent-strong); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .wrap { max-width: 1120px; margin: 0 auto; padding: 20px 24px 28px; }

      header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
      .brand-mark {
        width: 28px; height: 28px;
        display: grid; place-items: center;
        background: var(--accent-soft);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .brand-mark svg { width: 14px; height: 14px; color: var(--accent-strong); }
      header h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: var(--text-strong);
        flex: 1;
      }
      header .pill {
        font-size: 11px;
        padding: 3px 9px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        background: var(--surface);
      }
      header a.back {
        font-size: 12px;
        color: var(--muted);
        padding: 5px 11px;
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      header a.back:hover {
        color: var(--text-strong);
        border-color: var(--accent);
        text-decoration: none;
      }

      .conn {
        display: grid;
        grid-template-columns: 2fr 3fr auto;
        gap: 10px;
        align-items: end;
        background: var(--surface);
        padding: 14px;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        margin-bottom: 14px;
      }
      .conn label {
        font-size: 11px;
        color: var(--muted);
        display: flex; flex-direction: column;
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      .conn input {
        margin-top: 5px;
        padding: 9px 11px;
        background: var(--bg-elev);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 7px;
        font: inherit;
        transition: border-color .12s ease, box-shadow .12s ease;
      }
      .conn input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      button {
        background: var(--accent);
        color: #fff;
        border: 1px solid var(--accent);
        border-radius: 7px;
        padding: 9px 16px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: background .12s ease, border-color .12s ease;
      }
      button:hover:not(:disabled) { background: var(--accent-strong); border-color: var(--accent-strong); }
      button.ghost {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        font-weight: 500;
      }
      button.ghost:hover:not(:disabled) {
        color: var(--text-strong);
        border-color: var(--accent);
        background: var(--surface);
      }
      button.danger {
        background: rgba(248, 81, 73, 0.10);
        color: var(--bad);
        border: 1px solid rgba(248, 81, 73, 0.45);
        font-size: 12px;
        padding: 5px 12px;
        font-weight: 500;
      }
      button.danger:hover:not(:disabled) {
        background: rgba(248, 81, 73, 0.18);
        border-color: var(--bad);
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      .tabs {
        display: flex;
        gap: 2px;
        border-bottom: 1px solid var(--border-soft);
        margin-bottom: 14px;
      }
      .tabs button {
        background: transparent;
        color: var(--muted);
        padding: 10px 16px;
        border: none;
        border-radius: 0;
        font-weight: 500;
        font-size: 13px;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }
      .tabs button:hover {
        color: var(--text-strong);
        background: transparent;
      }
      .tabs button.active {
        color: var(--text-strong);
        border-bottom-color: var(--accent);
      }

      .panel {
        background: var(--surface);
        padding: 18px;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
      }
      .panel.hidden { display: none; }
      h2 {
        margin: 0 0 14px;
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
      }

      table { width: 100%; border-collapse: collapse; }
      th, td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border-soft);
        font-size: 13px;
      }
      th {
        font-weight: 600;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      tr:hover td { background: var(--surface-2); }
      tbody tr:last-child td { border-bottom: none; }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 2fr;
        gap: 10px;
        align-items: end;
      }
      .form-grid label {
        display: flex;
        flex-direction: column;
        font-size: 11px;
        color: var(--muted);
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      .form-grid input, .form-grid textarea {
        margin-top: 5px;
        padding: 9px 11px;
        background: var(--bg-elev);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 7px;
        font: inherit;
      }
      .form-grid input:focus, .form-grid textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      .token-output {
        margin-top: 14px;
        padding: 14px;
        background: var(--bg-elev);
        border: 1px solid rgba(210, 153, 34, .45);
        border-radius: 8px;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        word-break: break-all;
        font-size: 13px;
        color: var(--text);
      }
      .token-output strong {
        color: var(--warn);
        display: block;
        margin-bottom: 6px;
        font-family: var(--font-handwriting);
        font-weight: 600;
        font-size: 12px;
      }
      .badge {
        display: inline-block;
        padding: 2px 9px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
        border: 1px solid var(--border);
        color: var(--muted);
        background: var(--surface);
      }
      .badge.active { background: rgba(63, 185, 80, .12); color: var(--good); border-color: rgba(63, 185, 80, .35); }
      .badge.revoked { background: var(--surface-2); color: var(--muted); border-color: var(--border); }
      .badge.expired { background: rgba(210, 153, 34, .12); color: var(--warn); border-color: rgba(210, 153, 34, .45); }

      button.ghost.small {
        font-size: 12px;
        padding: 5px 12px;
      }

      /* ----- Editor modal ----- */
      [hidden] { display: none !important; }
      .modal {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .modal-backdrop {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, .55);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
      }
      .modal-card {
        position: relative;
        width: min(460px, 100%);
        max-height: 86vh;
        display: flex;
        flex-direction: column;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, .55);
      }
      .modal-head {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 18px;
        border-bottom: 1px solid var(--border-soft);
      }
      .modal-head h3 {
        margin: 0;
        flex: 1;
        font-size: 14px;
        font-weight: 600;
        color: var(--text-strong);
      }
      .modal-close {
        background: transparent;
        color: var(--muted);
        border: 1px solid transparent;
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 18px;
        line-height: 1;
        font-weight: 400;
      }
      .modal-close:hover:not(:disabled) {
        background: var(--surface-2);
        color: var(--text-strong);
        border-color: var(--border);
      }
      .modal-body {
        padding: 16px 18px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      .modal-body .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .modal-body .field > label {
        font-size: 11px;
        color: var(--muted);
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      .modal-body .field .help {
        font-size: 11px;
        color: var(--muted);
      }
      .modal-body input[type="text"],
      .modal-body input[type="number"],
      .modal-body input[type="datetime-local"],
      .modal-body textarea {
        padding: 9px 11px;
        background: var(--bg-elev);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 7px;
        font: inherit;
        width: 100%;
      }
      .modal-body textarea {
        resize: vertical;
        min-height: 60px;
      }
      .modal-body input:focus,
      .modal-body textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .modal-body .row-inline {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .modal-body .row-inline input { flex: 1; }
      .modal-body .pill {
        display: inline-block;
        padding: 3px 10px;
        font-size: 11px;
        border-radius: 999px;
        background: var(--surface-2);
        color: var(--muted);
        border: 1px solid var(--border-soft);
      }
      .modal-body .quota-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .modal-body .quota-row input { flex: 1; }
      .modal-body .status-row {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: space-between;
      }
      .modal-body .char-count {
        align-self: flex-end;
        font-size: 11px;
        color: var(--muted);
      }
      .modal-body .section-divider {
        margin: 4px 0 0;
        padding-top: 14px;
        border-top: 1px dashed var(--border-soft);
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .modal-body .section-divider h4 {
        margin: 0;
        font-size: 11px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
      }
      .modal-foot {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 18px;
        border-top: 1px solid var(--border-soft);
      }
      .modal-foot .spacer { flex: 1; }
      .modal-foot button { font-size: 13px; }

      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .status-bar > div { display: flex; align-items: center; gap: 12px; }
      .status-bar h2 { margin: 0; }
      .status { color: var(--muted); font-size: 12px; }
      .status.error { color: var(--bad); }
      .status.success { color: var(--good); }

      canvas {
        background: var(--bg-elev);
        border: 1px solid var(--border-soft);
        border-radius: 6px;
        width: 100%;
        height: 220px;
      }

      pre.detail {
        white-space: pre-wrap;
        word-break: break-all;
        margin: 0;
        font-size: 11px;
        color: var(--muted);
        max-width: 320px;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      label.inline-check {
        font-size: 12px;
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      /* ----- Audit filter row ----- */
      .filter-row {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 10px;
        margin-bottom: 12px;
        padding: 12px;
        background: var(--surface-2);
        border: 1px solid var(--border-soft);
        border-radius: 8px;
      }
      .filter-row label {
        display: flex;
        flex-direction: column;
        font-size: 11px;
        color: var(--muted);
        font-weight: 500;
        letter-spacing: 0.02em;
        gap: 4px;
      }
      .filter-row input,
      .filter-row select {
        padding: 7px 9px;
        background: var(--bg-elev);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        font: inherit;
        font-size: 12px;
      }
      .filter-row input:focus,
      .filter-row select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .filter-actions {
        display: flex;
        align-items: end;
        gap: 8px;
      }
      .filter-actions button {
        font-size: 12px;
        padding: 7px 12px;
      }

      /* ----- Pagination ----- */
      .pagination {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--border-soft);
      }
      .pagination .summary {
        font-size: 12px;
        color: var(--muted);
        margin-right: auto;
      }
      .pagination .summary strong {
        color: var(--text);
        font-weight: 600;
      }
      .pagination .page-size {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--muted);
      }
      .pagination .page-size select {
        padding: 5px 8px;
        background: var(--bg-elev);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      .pagination .page-size select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .pager {
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .pager button.page-btn {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 5px 10px;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
        min-width: 32px;
        transition: background .12s ease, border-color .12s ease, color .12s ease;
      }
      .pager button.page-btn:hover:not(:disabled):not(.active) {
        background: var(--surface-2);
        border-color: var(--accent);
        color: var(--text-strong);
      }
      .pager button.page-btn.active {
        background: var(--accent-soft);
        border-color: var(--accent);
        color: var(--accent-strong);
        cursor: default;
      }
      .pager button.page-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .pager .ellipsis {
        color: var(--muted);
        padding: 0 4px;
        user-select: none;
        font-size: 12px;
      }

      /* ----- Settings panel ----- */
      .settings-group {
        background: var(--surface-2);
        padding: 12px;
        border: 1px solid var(--border-soft);
        border-radius: 8px;
        margin-bottom: 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .settings-group h3 {
        /* Section headings are Chinese now (站点信息 / 对话行为 / …),
           so the uppercase + letter-spacing treatment that suited
           Latin headings makes the Chinese glyphs look spaced-out
           and weird. Drop both, raise size, lean into the handwriting
           cascade so the heading reads as a hand-written section
           marker — matching the notebook-style vibe of the rest of
           the panel. */
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        font-family: var(--font-handwriting);
        color: var(--text);
        letter-spacing: 0;
        text-transform: none;
      }
      .settings-fields {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .settings-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .settings-field.full {
        grid-column: 1 / -1;
      }
      .settings-field label.field-label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-family: var(--font-handwriting);
        font-size: 14px;
        color: var(--text);
        font-weight: 600;
        letter-spacing: 0;
      }
      .settings-field label.field-label .key {
        /* Inherit handwriting + size from the label; the dotted-path
           key isn't shown anymore (the Chinese label replaced it),
           but the span survives for the dirty-dot anchor. */
        font: inherit;
        color: inherit;
        font-weight: inherit;
      }
      .settings-field label.field-label .badge {
        font-size: 10px;
        padding: 1px 7px;
      }
      .settings-field input[type="text"],
      .settings-field input[type="password"],
      .settings-field input[type="number"],
      .settings-field textarea,
      .settings-field select {
        padding: 9px 11px;
        background: var(--bg-elev);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 7px;
        /* Pin handwriting + CJK-kaiti directly so input UA defaults
           don't strip the body font. font-size at 14px matches the
           body so a "label / input" pair reads as one consistent
           handwritten row. */
        font-family: var(--font-handwriting);
        font-size: 14px;
        line-height: 1.4;
        width: 100%;
      }
      .settings-field textarea {
        resize: vertical;
        min-height: 48px;
      }
      .settings-field input:focus,
      .settings-field textarea:focus,
      .settings-field select:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .settings-field.dirty input:not([type="checkbox"]),
      .settings-field.dirty textarea,
      .settings-field.dirty select {
        border-color: var(--accent);
      }
      .settings-field.dirty label.field-label::after {
        /* Subtle dot so an operator scanning the form can spot which
           rows they touched without relying on the border-color. */
        content: "";
        width: 6px;
        height: 6px;
        background: var(--accent);
        border-radius: 50%;
        margin-left: 4px;
      }
      .settings-field .secret-row {
        position: relative;
        display: flex;
        align-items: center;
        gap: 0;
      }
      .settings-field .secret-row input {
        padding-right: 56px;
      }
      .settings-field .secret-toggle {
        position: absolute;
        right: 6px;
        top: 50%;
        transform: translateY(-50%);
        background: transparent;
        color: var(--muted);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 3px 9px;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
      }
      .settings-field .secret-toggle:hover {
        color: var(--text-strong);
        border-color: var(--accent);
      }
      .settings-field .bool-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
      }
      .settings-field .bool-row input {
        width: auto;
        margin: 0;
      }
      .settings-field .hint {
        font-family: var(--font-handwriting);
        font-size: 12px;
        color: var(--muted);
        line-height: 1.5;
      }
      /* Restart button is a hot-secondary action. Sits inside the
         settings status bar alongside refresh / save so the operator's
         attention stays in one place after a save. */
      #restartFromSettingsBtn {
        color: var(--accent-strong);
        border-color: rgba(163, 113, 247, .45);
        background: var(--accent-soft);
      }
      #restartFromSettingsBtn:hover:not(:disabled) {
        color: #fff;
        background: var(--accent);
        border-color: var(--accent);
      }
      #restartFromSettingsBtn:disabled {
        opacity: 0.55;
        cursor: progress;
      }
      /* Global "保存全部修改" button: lit up only when there's at
         least one dirty field. Counter chip rendered inline. */
      #saveAllSettings:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      #saveAllSettings .count {
        font-size: 11px;
        opacity: 0.85;
        margin-left: 6px;
      }
      .settings-actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 12px;
      }
      .settings-actions .status { font-size: 12px; }
      .settings-actions button {
        font-size: 12px;
        padding: 6px 14px;
      }

      .login-shell {
        display: grid;
        place-items: center;
        min-height: 70vh;
      }
      .login-card {
        width: min(420px, 100%);
        background: var(--surface);
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        padding: 28px 26px;
      }
      .login-card h2 {
        margin: 0 0 8px;
        font-size: 18px;
        text-transform: none;
        letter-spacing: 0;
        color: var(--text-strong);
        font-weight: 650;
      }
      .login-card p.sub {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 13px;
      }
      .login-card label {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 10px;
        font-weight: 500;
      }
      .login-card input {
        width: 100%;
        margin-top: 5px;
        padding: 10px 11px;
        background: var(--bg-elev);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 7px;
        font: inherit;
      }
      .login-card input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .login-card .row {
        display: flex;
        gap: 10px;
        margin-top: 12px;
        align-items: center;
      }
      .login-card .row > button { flex: 0 0 auto; }
      .login-card .row .grow { flex: 1; }
      .api-base-row {
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px dashed var(--border-soft);
      }
      .hidden { display: none !important; }

      header .logout-btn {
        font-size: 12px;
        color: var(--muted);
        padding: 5px 11px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        font-weight: 500;
      }
      header .logout-btn:hover {
        color: var(--text-strong);
        border-color: var(--accent);
      }

      @media (max-width: 720px) {
        .conn { grid-template-columns: 1fr; }
        .form-grid { grid-template-columns: 1fr; }
        .settings-fields { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <!-- ===== LOGIN VIEW ===== -->
    <div id="loginView" class="wrap login-shell">
      <div class="login-card">
        <h2>WebChat Gateway · Admin</h2>
        <p class="sub">输入 master_admin_key 登录。会话以 Cookie 形式签发，关闭浏览器后过期。</p>
        <label>Master Admin Key
          <input id="loginKey" type="password" placeholder="paste master_admin_key" autocomplete="off" />
        </label>
        <div class="row">
          <button id="loginSubmit">登录</button>
          <button id="loginReveal" class="ghost" type="button">显隐</button>
          <span class="grow"></span>
          <span id="loginStatus" class="status"></span>
        </div>
        <div class="api-base-row">
          <label>API Base <span style="color:var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0;">(留空表示和当前页面同源)</span>
            <input id="apiBase" placeholder="" />
          </label>
        </div>
      </div>
    </div>

    <!-- ===== APP VIEW (hidden until logged in) ===== -->
    <div id="appView" class="wrap hidden">
      <header>
        <a class="brand" href="/" aria-label="Back to landing">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
          </span>
        </a>
        <h1>WebChat Gateway · Admin Panel</h1>
        <span class="pill" id="sessionPill">session</span>
        <button id="logoutBtn" class="logout-btn" type="button">登出</button>
        <a class="back" href="/">← 首页</a>
      </header>

      <div class="tabs">
        <button data-tab="issue" class="active">签发</button>
        <button data-tab="list">列表</button>
        <button data-tab="stats">用量</button>
        <button data-tab="audit">审计</button>
        <button data-tab="settings">设置</button>
      </div>

      <!-- Issue -->
      <section id="panel-issue" class="panel">
        <h2>签发新 Token</h2>
        <div class="form-grid">
          <label>Name
            <input id="iname" placeholder="alice" />
          </label>
          <label>每日配额
            <input id="iquota" type="number" min="1" placeholder="默认值留空" />
          </label>
          <label>备注
            <input id="inote" placeholder="alice@example.com (可选)" />
          </label>
        </div>
        <div style="margin-top: 14px; display: flex; align-items: center; gap: 12px;">
          <button id="issue">签发</button>
          <span id="issueStatus" class="status"></span>
        </div>
        <div id="tokenOutput" class="token-output" style="display:none;"></div>
      </section>

      <!-- List -->
      <section id="panel-list" class="panel hidden">
        <div class="status-bar">
          <h2>Token 列表</h2>
          <div>
            <label class="inline-check">
              <input type="checkbox" id="includeRevoked" /> 含已撤销
            </label>
            <button id="refreshList" class="ghost">刷新</button>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Name</th><th>状态</th><th>今日 / 配额</th>
              <th>创建</th><th>到期</th><th>备注</th><th></th>
            </tr>
          </thead>
          <tbody id="listBody"></tbody>
        </table>
        <div class="pagination" id="listPagination" hidden>
          <span class="summary" id="listSummary"></span>
          <label class="page-size">
            每页
            <select id="listPageSize">
              <option value="20">20</option>
              <option value="50" selected>50</option>
              <option value="100">100</option>
              <option value="200">200</option>
              <option value="500">500</option>
              <option value="1000">1000</option>
            </select>
            条
          </label>
          <div class="pager" id="listPager"></div>
        </div>
        <span id="listStatus" class="status"></span>
      </section>

      <!-- Stats -->
      <section id="panel-stats" class="panel hidden">
        <h2>用量统计</h2>
        <div class="form-grid" style="grid-template-columns: 2fr 1fr 1fr;">
          <label>Token Name
            <input id="sname" placeholder="alice" list="nameList" />
            <datalist id="nameList"></datalist>
          </label>
          <label>天数 (1-90)
            <input id="sdays" type="number" min="1" max="90" value="7" />
          </label>
          <button id="loadStats">加载</button>
        </div>
        <div style="margin-top: 14px;">
          <canvas id="statsChart" width="800" height="220"></canvas>
        </div>
        <table style="margin-top: 14px;">
          <thead><tr><th>日期</th><th>用量</th></tr></thead>
          <tbody id="statsBody"></tbody>
        </table>
        <span id="statsStatus" class="status"></span>
      </section>

      <!-- Audit -->
      <section id="panel-audit" class="panel hidden">
        <div class="status-bar">
          <h2>审计日志</h2>
          <div>
            <label class="inline-check">
              <input type="checkbox" id="autoRefresh" /> 自动刷新 (10s)
            </label>
            <button id="refreshAudit" class="ghost">刷新</button>

        </div>
        <div class="filter-row">
          <label>事件 (event)
            <input id="filterEvent" type="text" placeholder="如 chat_ok / auth_fail" autocomplete="off" spellcheck="false" />
          </label>
          <label>Name
            <input id="filterName" type="text" placeholder="模糊匹配" autocomplete="off" spellcheck="false" />
          </label>
          <label>IP
            <input id="filterIp" type="text" placeholder="模糊匹配" autocomplete="off" spellcheck="false" />
          </label>

            <input id="filterFrom" type="datetime-local" />

          <label>结束时间
            <input id="filterTo" type="datetime-local" />
          </label>
          <div class="filter-actions">
            <button id="applyFilter" type="button">筛选</button>
            <button id="clearFilter" class="ghost" type="button">清除</button>
          </div>
        </div>
        <table>
          <thead>
            <tr><th>时间</th><th>事件</th><th>Name</th><th>IP</th><th>详情</th></tr>
          </thead>
          <tbody id="auditBody"></tbody>
        </table>
        <div class="pagination" id="auditPagination" hidden>
          <span class="summary" id="auditSummary"></span>
          <label class="page-size">
            每页
            <select id="auditPageSize">
              <option value="20">20</option>
              <option value="50">50</option>
              <option value="100" selected>100</option>
              <option value="200">200</option>
              <option value="500">500</option>
              <option value="1000">1000</option>
            </select>
            条
          </label>
          <div class="pager" id="auditPager"></div>
        </div>
        <span id="auditStatus" class="status"></span>
      </section>

      <!-- Settings -->
      <section id="panel-settings" class="panel hidden">
        <div class="status-bar">
          <h2>插件设置</h2>
          <div>
            <span id="settingsStatus" class="status"></span>
            <button id="refreshSettings" class="ghost" type="button">刷新</button>
            <button id="restartFromSettingsBtn" class="ghost" type="button" title="停止并重启 WebChat 服务（保存后点这里使配置生效）">重启服务</button>
            <button id="saveAllSettings" type="button" disabled>保存全部修改</button>

        <div id="settingsContainer"></div>

    <!-- ===== EDITOR MODAL ===== -->
    <div id="editorModal" class="modal" hidden role="dialog"
         aria-modal="true" aria-labelledby="editorTitle">
      <div class="modal-backdrop" data-close></div>
      <div class="modal-card">
        <header class="modal-head">
          <h3 id="editorTitle">编辑凭证</h3>
          <button type="button" class="modal-close" data-close aria-label="关闭">×</button>
        </header>
        <form id="editorForm" class="modal-body">
          <div class="field">
            <label for="ed-name">Name</label>
            <input id="ed-name" type="text" autocomplete="off" />
            <span class="help">重命名会同步到用量与审计历史</span>
          </div>

          <div class="field">
            <label for="ed-quota">每日配额</label>
            <div class="quota-row">
              <span class="pill" id="ed-today">今日 0</span>
              <input id="ed-quota" type="number" min="1" max="1000000" step="1" />
            </div>
          </div>

          <div class="field">
            <label for="ed-expires">到期时间 <span class="help" style="margin-left:6px;">(留空表示永不过期)</span></label>
            <div class="row-inline">
              <input id="ed-expires" type="datetime-local" />
              <button type="button" id="ed-expires-clear" class="ghost small">清除</button>
            </div>
          </div>

          <div class="field">
            <label for="ed-note">备注</label>
            <textarea id="ed-note" maxlength="255" rows="2"></textarea>
            <span class="char-count" id="ed-note-count">0 / 255</span>
          </div>

          <div class="field">
            <label>状态</label>
            <div class="status-row">
              <span class="badge" id="ed-status-badge">active</span>
              <button type="button" id="ed-revoke-toggle" class="ghost small">撤销</button>
            </div>
          </div>

          <div class="section-divider">
            <h4>更换 Token</h4>
            <div class="row-inline">
              <button type="button" id="ed-regen-random" class="ghost small">重新生成 token</button>
              <span class="help" style="flex:1;">旧 token 立刻失效，仅显示一次</span>
            </div>
            <div class="field">
              <label for="ed-custom-token">或自定义 token <span class="help" style="margin-left:6px;">(保存时一并更换)</span></label>
              <input id="ed-custom-token" type="text" autocomplete="off" maxlength="256" placeholder="留空表示不更换" />
            </div>

          <span class="spacer"></span>

          <button type="submit" form="editorForm">保存</button>
        </footer>

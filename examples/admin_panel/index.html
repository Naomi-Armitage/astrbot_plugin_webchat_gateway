<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebChat Gateway · Admin Panel</title>
    <style>
      :root {
        --bg: #0d1117;
        --bg-elev: #0b0f15;
        --surface: #161b22;
        --surface-2: #1c2330;
        --border: #30363d;
        --border-soft: #21262d;
        --text: #e6edf3;
        --text-strong: #f0f6fc;
        --muted: #8b949e;
        --accent: #a371f7;
        --accent-strong: #b692ff;
        --accent-soft: rgba(163, 113, 247, 0.14);
        --good: #3fb950;
        --warn: #d29922;
        --bad: #f85149;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 14px/1.55 "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      a { color: var(--accent-strong); text-decoration: none; }
      a:hover { text-decoration: underline; }

      .wrap { max-width: 1120px; margin: 0 auto; padding: 20px 24px 28px; }

      header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
      }
      .brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
      .brand-mark {
        width: 28px; height: 28px;
        display: grid; place-items: center;
        background: var(--accent-soft);
        border: 1px solid var(--border);
        border-radius: 8px;
      }
      .brand-mark svg { width: 14px; height: 14px; color: var(--accent-strong); }
      header h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 600;
        color: var(--text-strong);
        flex: 1;
      }
      header .pill {
        font-size: 11px;
        padding: 3px 9px;
        border-radius: 999px;
        border: 1px solid var(--border);
        color: var(--muted);
        background: var(--surface);
      }
      header a.back {
        font-size: 12px;
        color: var(--muted);
        padding: 5px 11px;
        border: 1px solid var(--border);
        border-radius: 6px;
      }
      header a.back:hover {
        color: var(--text-strong);
        border-color: var(--accent);
        text-decoration: none;
      }

      .conn {
        display: grid;
        grid-template-columns: 2fr 3fr auto;
        gap: 10px;
        align-items: end;
        background: var(--surface);
        padding: 14px;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        margin-bottom: 14px;
      }
      .conn label {
        font-size: 11px;
        color: var(--muted);
        display: flex; flex-direction: column;
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      .conn input {
        margin-top: 5px;
        padding: 9px 11px;
        background: var(--bg-elev);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 7px;
        font: inherit;
        transition: border-color .12s ease, box-shadow .12s ease;
      }
      .conn input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      button {
        background: var(--accent);
        color: #fff;
        border: 1px solid var(--accent);
        border-radius: 7px;
        padding: 9px 16px;
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        transition: background .12s ease, border-color .12s ease;
      }
      button:hover:not(:disabled) { background: var(--accent-strong); border-color: var(--accent-strong); }
      button.ghost {
        background: transparent;
        color: var(--text);
        border: 1px solid var(--border);
        font-weight: 500;
      }
      button.ghost:hover:not(:disabled) {
        color: var(--text-strong);
        border-color: var(--accent);
        background: var(--surface);
      }
      button.danger {
        background: rgba(248, 81, 73, 0.10);
        color: var(--bad);
        border: 1px solid rgba(248, 81, 73, 0.45);
        font-size: 12px;
        padding: 5px 12px;
        font-weight: 500;
      }
      button.danger:hover:not(:disabled) {
        background: rgba(248, 81, 73, 0.18);
        border-color: var(--bad);
      }
      button:disabled { opacity: 0.5; cursor: not-allowed; }

      .tabs {
        display: flex;
        gap: 2px;
        border-bottom: 1px solid var(--border-soft);
        margin-bottom: 14px;
      }
      .tabs button {
        background: transparent;
        color: var(--muted);
        padding: 10px 16px;
        border: none;
        border-radius: 0;
        font-weight: 500;
        font-size: 13px;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
      }
      .tabs button:hover {
        color: var(--text-strong);
        background: transparent;
      }
      .tabs button.active {
        color: var(--text-strong);
        border-bottom-color: var(--accent);
      }

      .panel {
        background: var(--surface);
        padding: 18px;
        border: 1px solid var(--border-soft);
        border-radius: 10px;
      }
      .panel.hidden { display: none; }
      h2 {
        margin: 0 0 14px;
        font-size: 12px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-weight: 600;
      }

      table { width: 100%; border-collapse: collapse; }
      th, td {
        padding: 10px 12px;
        text-align: left;
        border-bottom: 1px solid var(--border-soft);
        font-size: 13px;
      }
      th {
        font-weight: 600;
        color: var(--muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      tr:hover td { background: var(--surface-2); }
      tbody tr:last-child td { border-bottom: none; }

      .form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 2fr;
        gap: 10px;
        align-items: end;
      }
      .form-grid label {
        display: flex;
        flex-direction: column;
        font-size: 11px;
        color: var(--muted);
        font-weight: 500;
        letter-spacing: 0.02em;
      }
      .form-grid input, .form-grid textarea {
        margin-top: 5px;
        padding: 9px 11px;
        background: var(--bg-elev);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 7px;
        font: inherit;
      }
      .form-grid input:focus, .form-grid textarea:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }

      .token-output {
        margin-top: 14px;
        padding: 14px;
        background: var(--bg-elev);
        border: 1px solid rgba(210, 153, 34, .45);
        border-radius: 8px;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        word-break: break-all;
        font-size: 13px;
        color: var(--text);
      }
      .token-output strong {
        color: var(--warn);
        display: block;
        margin-bottom: 6px;
        font-family: "Inter", system-ui, sans-serif;
        font-weight: 600;
        font-size: 12px;
      }
      .badge {
        display: inline-block;
        padding: 2px 9px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 500;
        border: 1px solid var(--border);
        color: var(--muted);
        background: var(--surface);
      }
      .badge.active { background: rgba(63, 185, 80, .12); color: var(--good); border-color: rgba(63, 185, 80, .35); }
      .badge.revoked { background: var(--surface-2); color: var(--muted); border-color: var(--border); }

      .status-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
      }
      .status-bar > div { display: flex; align-items: center; gap: 12px; }
      .status-bar h2 { margin: 0; }
      .status { color: var(--muted); font-size: 12px; }
      .status.error { color: var(--bad); }
      .status.success { color: var(--good); }

      canvas {
        background: var(--bg-elev);
        border: 1px solid var(--border-soft);
        border-radius: 6px;
        width: 100%;
        height: 220px;
      }

      pre.detail {
        white-space: pre-wrap;
        word-break: break-all;
        margin: 0;
        font-size: 11px;
        color: var(--muted);
        max-width: 320px;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      label.inline-check {
        font-size: 12px;
        color: var(--muted);
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .login-shell {
        display: grid;
        place-items: center;
        min-height: 70vh;
      }
      .login-card {
        width: min(420px, 100%);
        background: var(--surface);
        border: 1px solid var(--border-soft);
        border-radius: 12px;
        padding: 28px 26px;
      }
      .login-card h2 {
        margin: 0 0 8px;
        font-size: 18px;
        text-transform: none;
        letter-spacing: 0;
        color: var(--text-strong);
        font-weight: 650;
      }
      .login-card p.sub {
        margin: 0 0 18px;
        color: var(--muted);
        font-size: 13px;
      }
      .login-card label {
        display: block;
        font-size: 11px;
        color: var(--muted);
        margin-bottom: 10px;
        font-weight: 500;
      }
      .login-card input {
        width: 100%;
        margin-top: 5px;
        padding: 10px 11px;
        background: var(--bg-elev);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 7px;
        font: inherit;
      }
      .login-card input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-soft);
      }
      .login-card .row {
        display: flex;
        gap: 10px;
        margin-top: 12px;
        align-items: center;
      }
      .login-card .row > button { flex: 0 0 auto; }
      .login-card .row .grow { flex: 1; }
      .api-base-row {
        margin-top: 18px;
        padding-top: 14px;
        border-top: 1px dashed var(--border-soft);
      }
      .hidden { display: none !important; }

      header .logout-btn {
        font-size: 12px;
        color: var(--muted);
        padding: 5px 11px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: transparent;
        font-weight: 500;
      }
      header .logout-btn:hover {
        color: var(--text-strong);
        border-color: var(--accent);
      }

      @media (max-width: 720px) {
        .conn { grid-template-columns: 1fr; }
        .form-grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <!-- ===== LOGIN VIEW ===== -->
    <div id="loginView" class="wrap login-shell">
      <div class="login-card">
        <h2>WebChat Gateway · Admin</h2>
        <p class="sub">输入 master_admin_key 登录。会话以 Cookie 形式签发，关闭浏览器后过期。</p>
        <label>Master Admin Key
          <input id="loginKey" type="password" placeholder="paste master_admin_key" autocomplete="off" />
        </label>
        <div class="row">
          <button id="loginSubmit">登录</button>
          <button id="loginReveal" class="ghost" type="button">显隐</button>
          <span class="grow"></span>
          <span id="loginStatus" class="status"></span>
        </div>
        <div class="api-base-row">
          <label>API Base <span style="color:var(--muted); font-weight: 400; text-transform: none; letter-spacing: 0;">(留空表示和当前页面同源)</span>
            <input id="apiBase" placeholder="" />
          </label>
        </div>
      </div>
    </div>

    <!-- ===== APP VIEW (hidden until logged in) ===== -->
    <div id="appView" class="wrap hidden">
      <header>
        <a class="brand" href="/" aria-label="Back to landing">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
            </svg>
          </span>
        </a>
        <h1>WebChat Gateway · Admin Panel</h1>
        <span class="pill" id="sessionPill">session</span>
        <button id="logoutBtn" class="logout-btn" type="button">登出</button>
        <a class="back" href="/">← 首页</a>
      </header>

      <div class="tabs">
        <button data-tab="issue" class="active">签发</button>
        <button data-tab="list">列表</button>
        <button data-tab="stats">用量</button>
        <button data-tab="audit">审计</button>
      </div>

      <!-- Issue -->
      <section id="panel-issue" class="panel">
        <h2>签发新 Token</h2>
        <div class="form-grid">
          <label>Name
            <input id="iname" placeholder="alice" />
          </label>
          <label>每日配额
            <input id="iquota" type="number" min="1" placeholder="默认值留空" />
          </label>
          <label>备注
            <input id="inote" placeholder="alice@example.com (可选)" />
          </label>
        </div>
        <div style="margin-top: 14px; display: flex; align-items: center; gap: 12px;">
          <button id="issue">签发</button>
          <span id="issueStatus" class="status"></span>
        </div>
        <div id="tokenOutput" class="token-output" style="display:none;"></div>
      </section>

      <!-- List -->
      <section id="panel-list" class="panel hidden">
        <div class="status-bar">
          <h2>Token 列表</h2>
          <div>
            <label class="inline-check">
              <input type="checkbox" id="includeRevoked" /> 含已撤销
            </label>
            <button id="refreshList" class="ghost">刷新</button>
          </div>
        </div>
        <table>
          <thead>
            <tr>
              <th>Name</th><th>状态</th><th>今日 / 配额</th>
              <th>创建</th><th>备注</th><th></th>
            </tr>
          </thead>
          <tbody id="listBody"></tbody>
        </table>
        <span id="listStatus" class="status"></span>
      </section>

      <!-- Stats -->
      <section id="panel-stats" class="panel hidden">
        <h2>用量统计</h2>
        <div class="form-grid" style="grid-template-columns: 2fr 1fr 1fr;">
          <label>Token Name
            <input id="sname" placeholder="alice" list="nameList" />
            <datalist id="nameList"></datalist>
          </label>
          <label>天数 (1-90)
            <input id="sdays" type="number" min="1" max="90" value="7" />
          </label>
          <button id="loadStats">加载</button>
        </div>
        <div style="margin-top: 14px;">
          <canvas id="statsChart" width="800" height="220"></canvas>
        </div>
        <table style="margin-top: 14px;">
          <thead><tr><th>日期</th><th>用量</th></tr></thead>
          <tbody id="statsBody"></tbody>
        </table>
        <span id="statsStatus" class="status"></span>
      </section>

      <!-- Audit -->
      <section id="panel-audit" class="panel hidden">
        <div class="status-bar">
          <h2>审计日志</h2>
          <div>
            <label class="inline-check">
              <input type="checkbox" id="autoRefresh" /> 自动刷新 (10s)
            </label>
            <button id="refreshAudit" class="ghost">刷新</button>
          </div>
        </div>
        <table>
          <thead>
            <tr><th>时间</th><th>事件</th><th>Name</th><th>IP</th><th>详情</th></tr>
          </thead>
          <tbody id="auditBody"></tbody>
        </table>
        <span id="auditStatus" class="status"></span>
      </section>
    </div>

    <script>
      const LS_API_BASE = "wcg.adm.apiBase";
      const $ = (id) => document.getElementById(id);

      const apiBase = $("apiBase");
      const loginKey = $("loginKey");
      const loginStatus = $("loginStatus");
      const sessionPill = $("sessionPill");

      // apiBase: empty default = same-origin (cookie auth works).
      // Persist if the user explicitly fills it in for cross-origin admin
      // panel hosting (in which case the gateway must allow that origin
      // and the user falls back to bearer entry for every call).
      apiBase.value = localStorage.getItem(LS_API_BASE) || "";
      apiBase.addEventListener("change", () =>
        localStorage.setItem(LS_API_BASE, apiBase.value.trim())
      );

      $("loginReveal").onclick = () => {
        loginKey.type = loginKey.type === "password" ? "text" : "password";
      };

      function showLogin(message = "") {
        $("loginView").classList.remove("hidden");
        $("appView").classList.add("hidden");
        loginStatus.textContent = message || "";
        loginStatus.className = message ? "status error" : "status";
        loginKey.focus();
      }
      function showApp(kind) {
        $("loginView").classList.add("hidden");
        $("appView").classList.remove("hidden");
        sessionPill.textContent = kind === "bearer" ? "bearer" : "session";
        loginKey.value = "";
      }

      function buildUrl(path) {
        const base = apiBase.value.trim();
        return `${base}${path}`;
      }

      async function api(path, opts = {}) {
        const headers = Object.assign(
          { "Content-Type": "application/json" },
          opts.headers || {}
        );
        const resp = await fetch(
          buildUrl(path),
          Object.assign(
            { credentials: "include", headers },
            opts
          )
        );
        let payload;
        try { payload = await resp.json(); } catch { payload = {}; }
        if (!resp.ok) {
          const err = new Error(payload.error || `http_${resp.status}`);
          err.payload = payload;
          err.status = resp.status;
          if (resp.status === 401) {
            // Session expired or never present — bounce to login.
            showLogin("会话已失效，请重新登录。");
          }
          throw err;
        }
        return payload;
      }

      // ----- session bootstrap -----
      async function probeSession() {
        try {
          const me = await fetch(buildUrl("/api/webchat/admin/me"), {
            credentials: "include",
          });
          if (me.ok) {
            const data = await me.json().catch(() => ({}));
            showApp(data.kind || "session");
            return true;
          }
        } catch (e) {
          // Network / CORS; fall through to login.
        }
        showLogin("");
        return false;
      }

      async function doLogin() {
        const key = loginKey.value.trim();
        if (!key) {
          loginStatus.textContent = "请输入 master_admin_key";
          loginStatus.className = "status error";
          return;
        }
        loginStatus.textContent = "登录中...";
        loginStatus.className = "status";
        try {
          const resp = await fetch(buildUrl("/api/webchat/admin/login"), {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ key }),
          });
          const data = await resp.json().catch(() => ({}));
          if (!resp.ok) {
            loginStatus.textContent = `登录失败: ${data.error || resp.status}`;
            loginStatus.className = "status error";
            return;
          }
          showApp("session");
        } catch (e) {
          loginStatus.textContent = `登录失败: ${e.message}`;
          loginStatus.className = "status error";
        }
      }

      $("loginSubmit").onclick = doLogin;
      loginKey.addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });

      $("logoutBtn").onclick = async () => {
        try {
          await fetch(buildUrl("/api/webchat/admin/logout"), {
            method: "POST",
            credentials: "include",
          });
        } catch (e) {
          // Cookie clear-on-error is the server's job; we still show login.
        }
        showLogin("已登出。");
      };

      // tab switching
      const tabs = document.querySelectorAll(".tabs button");
      tabs.forEach((tab) => {
        tab.onclick = () => {
          tabs.forEach((t) => t.classList.toggle("active", t === tab));
          ["issue", "list", "stats", "audit"].forEach((name) => {
            $(`panel-${name}`).classList.toggle("hidden", name !== tab.dataset.tab);
          });
          if (tab.dataset.tab === "list") loadList();
          if (tab.dataset.tab === "audit") loadAudit();
          if (tab.dataset.tab === "stats") populateNames();
        };
      });

      function fmt(ts) {
        if (!ts) return "-";
        return new Date(ts * 1000).toLocaleString();
      }

      // ----- Issue -----
      $("issue").onclick = async () => {
        const status = $("issueStatus");
        const out = $("tokenOutput");
        status.textContent = "签发中...";
        status.className = "status";
        out.style.display = "none";
        out.textContent = "";
        try {
          const body = {
            name: $("iname").value.trim(),
            note: $("inote").value.trim(),
          };
          const q = $("iquota").value.trim();
          if (q) body.daily_quota = Number(q);
          const result = await api("/api/webchat/admin/tokens", {
            method: "POST",
            body: JSON.stringify(body),
          });
          status.textContent = `已签发 ${result.name}，配额 ${result.daily_quota}`;
          status.className = "status success";
          // F1: build DOM with text nodes — never inject untrusted text via innerHTML
          out.textContent = "";
          const strong = document.createElement("strong");
          strong.textContent = "⚠ 此 Token 仅显示一次，请立即保存：";
          out.appendChild(strong);
          out.appendChild(document.createTextNode(result.token));
          out.style.display = "block";
        } catch (e) {
          status.textContent = `失败: ${e.message} ${e.payload && e.payload.detail || ""}`;
          status.className = "status error";
        }
      };

      // ----- List -----
      let lastList = [];
      async function loadList() {
        const status = $("listStatus");
        status.textContent = "加载中...";
        status.className = "status";
        try {
          const q = $("includeRevoked").checked ? "?include_revoked=true" : "";
          const data = await api(`/api/webchat/admin/tokens${q}`);
          lastList = data.tokens;
          renderList(data.tokens);
          status.textContent = `${data.tokens.length} 个 token`;
          status.className = "status success";
        } catch (e) {
          status.textContent = `失败: ${e.message}`;
          status.className = "status error";
        }
      }
      function renderList(rows) {
        const body = $("listBody");
        body.innerHTML = "";
        for (const t of rows) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${escape(t.name)}</td>
            <td><span class="badge ${t.revoked_at ? "revoked" : "active"}">
              ${t.revoked_at ? "REVOKED" : "active"}
            </span></td>
            <td>${t.today_usage} / ${t.daily_quota}</td>
            <td>${fmt(t.created_at)}</td>
            <td>${escape(t.note || "")}</td>
            <td></td>
          `;
          if (!t.revoked_at) {
            const btn = document.createElement("button");
            btn.className = "danger";
            btn.textContent = "撤销";
            btn.onclick = () => revokeToken(t.name);
            tr.lastElementChild.appendChild(btn);
          }
          body.appendChild(tr);
        }
      }
      async function revokeToken(name) {
        if (!confirm(`确定撤销 ${name}?`)) return;
        try {
          await api(`/api/webchat/admin/tokens/${encodeURIComponent(name)}`, {
            method: "DELETE",
          });
          loadList();
        } catch (e) {
          alert(`撤销失败: ${e.message}`);
        }
      }
      $("refreshList").onclick = loadList;
      $("includeRevoked").onchange = loadList;

      // ----- Stats -----
      function populateNames() {
        const dl = $("nameList");
        dl.innerHTML = "";
        for (const t of lastList) {
          const opt = document.createElement("option");
          opt.value = t.name;
          dl.appendChild(opt);
        }
      }
      $("loadStats").onclick = async () => {
        const status = $("statsStatus");
        status.textContent = "加载中...";
        status.className = "status";
        try {
          const name = encodeURIComponent($("sname").value.trim());
          const days = Number($("sdays").value) || 7;
          const data = await api(`/api/webchat/admin/stats?name=${name}&days=${days}`);
          renderStats(data);
          status.textContent = `配额 ${data.daily_quota}${data.revoked ? " (已撤销)" : ""}`;
          status.className = "status success";
        } catch (e) {
          status.textContent = `失败: ${e.message}`;
          status.className = "status error";
        }
      };
      function renderStats(data) {
        const tbody = $("statsBody");
        tbody.innerHTML = "";
        for (const item of data.history) {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td>${item.day}</td><td>${item.count}</td>`;
          tbody.appendChild(tr);
        }
        drawChart(data.history, data.daily_quota);
      }
      function drawChart(history, quota) {
        const canvas = $("statsChart");
        const ctx = canvas.getContext("2d");
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);
        if (history.length === 0) return;
        const max = Math.max(quota, ...history.map((h) => h.count), 1);
        const padL = 40, padB = 22, padT = 12;
        const usable = H - padT - padB;
        const barW = (W - padL) / history.length;
        // grid + quota line
        ctx.strokeStyle = "#30363d";
        ctx.fillStyle = "#8b949e";
        ctx.font = "11px ui-monospace, SFMono-Regular, Menlo, monospace";
        const yQuota = padT + usable - (quota / max) * usable;
        ctx.beginPath();
        ctx.setLineDash([4, 4]);
        ctx.moveTo(padL, yQuota);
        ctx.lineTo(W, yQuota);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillText(`quota=${quota}`, 4, yQuota + 4);
        // bars
        history.forEach((item, i) => {
          const h = (item.count / max) * usable;
          const x = padL + i * barW + 3;
          const y = padT + usable - h;
          ctx.fillStyle = item.count >= quota ? "#f85149" : "#a371f7";
          ctx.fillRect(x, y, barW - 6, h);
          ctx.fillStyle = "#8b949e";
          if (i % Math.ceil(history.length / 7) === 0) {
            ctx.fillText(item.day.slice(5), x, H - 6);
          }
        });
      }

      // ----- Audit -----
      let auditTimer = null;
      async function loadAudit() {
        const status = $("auditStatus");
        status.textContent = "加载中...";
        status.className = "status";
        try {
          const data = await api("/api/webchat/admin/audit?limit=200");
          renderAudit(data.events);
          status.textContent = `${data.events.length} 条`;
          status.className = "status success";
        } catch (e) {
          status.textContent = `失败: ${e.message}`;
          status.className = "status error";
        }
      }
      function renderAudit(events) {
        const body = $("auditBody");
        body.innerHTML = "";
        for (const ev of events) {
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${fmt(ev.ts)}</td>
            <td>${escape(ev.event)}</td>
            <td>${escape(ev.name || "-")}</td>
            <td>${escape(ev.ip || "-")}</td>
            <td><pre class="detail">${escape(ev.detail || "")}</pre></td>
          `;
          body.appendChild(tr);
        }
      }
      $("refreshAudit").onclick = loadAudit;
      $("autoRefresh").onchange = (e) => {
        clearInterval(auditTimer);
        if (e.target.checked) {
          auditTimer = setInterval(loadAudit, 10000);
        }
      };

      function escape(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // Boot: see if a prior session is still good before showing login.
      probeSession();
    </script>
  </body>
</html>

name: python

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements.txt"
      - "tests/requirements.txt"
      - "pytest.ini"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "**.py"
      - "requirements.txt"
      - "tests/requirements.txt"
      - "pytest.ini"
      - ".github/workflows/python.yml"

permissions:
  contents: read

jobs:
  syntax-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.10"

      # AST parse every .py — catches missing imports / typos / unbalanced
      # parens without needing a full env. Cheap to run.
      - name: AST parse all Python files
        run: |
          set -euo pipefail
          python -c '
          import ast, pathlib, sys
          ok = True
          for p in pathlib.Path(".").rglob("*.py"):
              if any(part in {".git", "node_modules", ".venv"} for part in p.parts):
                  continue
              try:
                  ast.parse(p.read_text(encoding="utf-8"), str(p))
              except SyntaxError as e:
                  print(f"SYNTAX: {p}:{e.lineno}: {e.msg}", file=sys.stderr)
                  ok = False
          sys.exit(0 if ok else 1)
          '

      - name: Install ruff
        run: pip install "ruff==0.7.4"

      # ruff check: bug-finder rules only (E + F + W). Style rules
      # (I/N/UP/B/...) are intentionally skipped — codebase has its
      # own conventions and we don't want CI to bikeshed formatting.
      - name: Lint with ruff
        run: ruff check --select=E,F,W --ignore=E501,E731 --line-length 120 .

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: "3.10"

      # Test deps are intentionally separated from runtime deps
      # (tests/requirements.txt vs requirements.txt) so prod installs
      # stay lean. AstrBot itself is NOT installed: tests/conftest.py
      # stubs the `astrbot.api` modules in sys.modules.
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r tests/requirements.txt

      - name: Run pytest
        run: pytest -v

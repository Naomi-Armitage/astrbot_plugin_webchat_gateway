name: web

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "examples/landing/index.html"
      - "examples/login/index.html"
      - ".github/workflows/web.yml"
  pull_request:
    paths:
      - "web/**"
      - "examples/landing/index.html"
      - "examples/login/index.html"
      - ".github/workflows/web.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - working-directory: web
        run: npm ci
      - working-directory: web
        run: npm run typecheck
      - working-directory: web
        run: npm run build

      - name: Verify built artifacts are committed
        run: |
          set -euo pipefail
          if ! git diff --exit-code -- examples/landing/index.html examples/login/index.html; then
            echo "::error::examples/{landing,login}/index.html drifted from web/src/. Run 'cd web && npm run build' and commit the result."
            exit 1
          fi

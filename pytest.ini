[pytest]
# `strict` is the default in pytest-asyncio>=1.0 but pinning it here
# means a future major bump that flips the default won't silently
# accept async tests missing `@pytest.mark.asyncio`.
asyncio_mode = strict
testpaths = tests
# Tracebacks are short by default — the integration test in particular
# produces multi-line per-client stats that benefit from `-s`. Use
# `pytest -s` locally to see them.
addopts = --tb=short
filterwarnings =
    ignore::DeprecationWarning:asyncio
